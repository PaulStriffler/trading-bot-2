<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trading Desk · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --bg-soft: #0d1220;
    --panel: rgba(20, 27, 45, 0.55);
    --panel-solid: #131a2c;
    --panel-2: rgba(28, 36, 56, 0.6);
    --panel-3: #1a2238;
    --border: rgba(255, 255, 255, 0.07);
    --border-strong: rgba(255, 255, 255, 0.12);
    --text: #ffffff;
    --text-mid: #a0a8c0;
    --text-dim: #6e7892;
    --text-faint: #4a5070;
    --accent-1: #3b82f6;
    --accent-2: #a855f7;
    --accent-3: #06b6d4;
    --brand: linear-gradient(135deg, #3b82f6 0%, #a855f7 100%);
    --brand-soft: linear-gradient(135deg, rgba(59,130,246,0.18) 0%, rgba(168,85,247,0.18) 100%);
    --win: #10b981;
    --win-bg: rgba(16, 185, 129, 0.12);
    --win-glow: rgba(16, 185, 129, 0.35);
    --loss: #ef4444;
    --loss-bg: rgba(239, 68, 68, 0.12);
    --warn: #f59e0b;
    --warn-bg: rgba(245, 158, 11, 0.12);
  }
  * { box-sizing: border-box; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  body {
    font-weight: 400; font-size: 14px; letter-spacing: -0.005em;
    background:
      radial-gradient(ellipse 1200px 600px at 15% -10%, rgba(59,130,246,0.10), transparent 50%),
      radial-gradient(ellipse 1000px 700px at 100% 15%, rgba(168,85,247,0.08), transparent 50%),
      radial-gradient(ellipse 900px 500px at 50% 110%, rgba(6,182,212,0.05), transparent 50%),
      var(--bg);
    min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 13px; }
  .num { font-variant-numeric: tabular-nums; }

  /* Glass cards */
  .glass {
    background: var(--panel);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .glass-soft {
    background: var(--panel-2);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .solid { background: var(--panel-solid); border: 1px solid var(--border); border-radius: 16px; }

  /* Brand-coloured accents */
  .brand-text {
    background: var(--brand); -webkit-background-clip: text;
    background-clip: text; color: transparent;
  }
  .brand-bg { background: var(--brand); }
  .brand-soft-bg { background: var(--brand-soft); }

  /* Glow effects */
  .glow-win {
    box-shadow: 0 0 24px var(--win-glow), inset 0 0 1px rgba(255,255,255,0.05);
  }

  /* Typography utilities */
  h1.page-title {
    font-size: 32px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1;
  }
  .kpi-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-dim); font-weight: 600;
  }
  .kpi-value {
    font-size: 40px; font-weight: 700; letter-spacing: -0.035em;
    margin-top: 8px; line-height: 1; font-feature-settings: "tnum" 1;
  }
  .kpi-value.hero {
    font-size: 56px; font-weight: 800; letter-spacing: -0.04em;
  }
  .kpi-value.small { font-size: 26px; font-weight: 600; }
  .kpi-unit { font-size: 18px; color: var(--text-dim); font-weight: 500; margin-left: 2px; }
  .win { color: var(--win); }
  .loss { color: var(--loss); }

  /* Sidebar */
  .sidebar {
    background: linear-gradient(180deg, rgba(13, 18, 32, 0.95), rgba(10, 14, 26, 0.95));
    backdrop-filter: blur(20px);
    border-color: var(--border);
  }
  .brand-logo {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--brand);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #fff; font-size: 16px;
    box-shadow: 0 4px 14px rgba(59,130,246,0.35);
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 16px; margin: 2px 10px;
    cursor: pointer; border-radius: 10px;
    color: var(--text-mid); font-size: 13.5px; font-weight: 500;
    transition: all 0.18s;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .nav-item.active {
    color: var(--text);
    background: var(--brand-soft);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .nav-item.active .nav-icon { color: var(--accent-1); }
  .nav-icon { width: 18px; height: 18px; flex-shrink: 0; color: var(--text-dim); }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 6px; font-size: 11px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge-active, .badge-live, .badge-win, .badge-long { color: var(--win); background: var(--win-bg); }
  .badge-planned, .badge-backtest { color: var(--warn); background: var(--warn-bg); }
  .badge-loss, .badge-short { color: var(--loss); background: var(--loss-bg); }
  .badge-neutral { color: var(--text-mid); background: rgba(255,255,255,0.06); }
  .badge-brand { color: #fff; background: var(--brand-soft); border: 1px solid rgba(168,85,247,0.3); }
  .pill {
    padding: 3px 9px; border-radius: 6px; font-size: 11px;
    font-weight: 500; background: rgba(255,255,255,0.05); color: var(--text-mid);
  }
  .pill-outline {
    background: transparent; border: 1px solid var(--border-strong);
  }

  /* Forms */
  input.field, select.field, textarea.field {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-size: 13px; font-weight: 500;
    outline: none; transition: all 0.15s; font-family: inherit; width: 100%;
  }
  input.field:focus, select.field:focus, textarea.field:focus {
    border-color: var(--accent-1); background: rgba(59,130,246,0.06);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  input.field::placeholder, textarea.field::placeholder { color: var(--text-faint); }
  label.field-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); font-weight: 600; margin-bottom: 6px; display: block;
  }
  textarea.field { resize: vertical; min-height: 64px; line-height: 1.5; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--brand); color: #fff;
    padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    transition: all 0.2s; font-family: inherit;
    box-shadow: 0 4px 14px rgba(59,130,246,0.25);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
  .btn-ghost {
    background: rgba(255,255,255,0.04); color: var(--text);
    border: 1px solid var(--border-strong); box-shadow: none;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); transform: none; box-shadow: none; }
  .btn-danger {
    background: var(--loss-bg); color: var(--loss); border: 1px solid rgba(239,68,68,0.25);
    box-shadow: none;
  }
  .btn-danger:hover { background: rgba(239,68,68,0.2); transform: none; box-shadow: none; }
  .btn-sm { padding: 7px 14px; font-size: 12px; }

  /* Table */
  table.dt { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.dt th {
    text-align: left; font-weight: 600; color: var(--text-dim);
    padding: 14px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border); background: var(--panel-solid);
    position: sticky; top: 0; cursor: pointer; user-select: none; white-space: nowrap;
  }
  table.dt th:hover { color: var(--text); }
  table.dt td {
    padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
    white-space: nowrap;
  }
  table.dt td.wrap { white-space: normal; max-width: 220px; }
  table.dt tbody tr { transition: background 0.1s; cursor: pointer; }
  table.dt tbody tr:hover { background: rgba(255,255,255,0.03); }

  /* Scrollbars */
  .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }
  .scroll-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(5, 7, 15, 0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; padding: 24px; backdrop-filter: blur(8px);
  }
  .modal {
    background: var(--panel-solid); border: 1px solid var(--border-strong); border-radius: 16px;
    width: 100%; max-width: 1080px; max-height: 92vh; overflow-y: auto;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  }

  /* Image upload */
  .img-drop {
    border: 1px dashed var(--border-strong); border-radius: 10px;
    padding: 24px; text-align: center; cursor: pointer;
    transition: all 0.15s; background: rgba(255,255,255,0.02);
    min-height: 160px; display: flex; align-items: center; justify-content: center;
  }
  .img-drop:hover { border-color: var(--accent-1); background: rgba(59,130,246,0.06); }
  .img-drop.has-image { padding: 0; background: var(--bg); position: relative; overflow: hidden; }
  .img-drop img { max-width: 100%; max-height: 240px; display: block; margin: 0 auto; border-radius: 4px; }
  .img-remove {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.85); color: white; border: 1px solid var(--border-strong);
    width: 28px; height: 28px; border-radius: 14px; cursor: pointer;
    font-size: 14px; line-height: 1;
  }

  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--accent-1); font-weight: 700; margin: 28px 0 14px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .section-title:first-child { margin-top: 0; }

  .panel-stack > .glass { margin-bottom: 16px; }
  .panel-stack > .glass:last-child { margin-bottom: 0; }

  /* Sparkline canvas height */
  .sparkline { height: 48px !important; max-height: 48px !important; }

  /* Live dot */
  @keyframes pulse-soft { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .live-dot { width: 6px; height: 6px; border-radius: 3px; background: var(--win);
    box-shadow: 0 0 8px var(--win); animation: pulse-soft 1.8s ease-in-out infinite; display: inline-block; }
</style>
</head>
<body class="min-h-screen">

<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-60 flex-shrink-0 border-r relative sidebar">

  <!-- Main -->
  <main class="flex-1 overflow-x-auto scroll-thin">

<script>
// ============================================================
// State
// ============================================================
const STATE = { bots: loadBots() };
const JOURNAL_STATE = {
  entries: loadJournal(),
  editing: null,
  detailView: null,
  filter: { search: "", outcome: "all", instrument: "all" },
  sort: { key: "date", asc: false },
};

function loadBots() {
  const saved = localStorage.getItem("bots_v2");
  if (saved) { try { return JSON.parse(saved); } catch {} }
  return JSON.parse(JSON.stringify(window.DATA.bots));
}
function saveBots() { localStorage.setItem("bots_v2", JSON.stringify(STATE.bots)); }
function resetBots() { localStorage.removeItem("bots_v2"); STATE.bots = loadBots(); render(); }

function loadJournal() {
  try { return JSON.parse(localStorage.getItem("journal_v1") || "[]"); }
  catch { return []; }
}
function saveJournal() { localStorage.setItem("journal_v1", JSON.stringify(JOURNAL_STATE.entries)); }

const ROUTES = ["dashboard", "strategien", "trades", "journal", "bots"];
function currentRoute() { const h = location.hash.replace("#", ""); return ROUTES.includes(h) ? h : "dashboard"; }
function navigate(route) { location.hash = route; }
window.addEventListener("hashchange", render);

const fmtMoney = (n, sign = false) => {
  const num = Math.abs(n).toLocaleString("en-US", { maximumFractionDigits: 0 });
  return (n < 0 ? "-" : (sign && n > 0 ? "+" : "")) + "$" + num;
};
const fmtPct = (n, sign = true) => (sign && n > 0 ? "+" : "") + n.toFixed(1) + "%";
const cls = (n) => n >= 0 ? "win" : "loss";
const arrow = (n) => n >= 0 ? "↑" : "↓";
const uid = () => "j_" + Math.random().toString(36).slice(2, 10);

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

async function readImageAsBase64(file, maxWidth = 1400) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ratio = Math.min(1, maxWidth / img.width);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.82));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ============================================================
// Chart helpers
// ============================================================
const chartDefaults = {
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: "rgba(13, 18, 32, 0.95)", borderColor: "rgba(255,255,255,0.12)",
      borderWidth: 1, padding: 10, displayColors: false,
      titleColor: "#a0a8c0", bodyColor: "#fff",
    }
  },
};

function makeSparkline(ctxEl, data, color) {
  if (!ctxEl) return;
  new Chart(ctxEl, {
    type: "line",
    data: {
      labels: data.map((_, i) => i),
      datasets: [{
        data, borderColor: color, borderWidth: 1.8,
        backgroundColor: ctx => {
          const c = ctx.chart.ctx; const g = c.createLinearGradient(0, 0, 0, 50);
          g.addColorStop(0, color.replace(")", ", 0.35)").replace("rgb", "rgba")); g.addColorStop(1, color.replace(")", ", 0)").replace("rgb", "rgba"));
          return g;
        },
        fill: true, tension: 0.35, pointRadius: 0,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false } },
      elements: { point: { radius: 0 } },
    }
  });
}

// ============================================================
// Dashboard
// ============================================================
function viewDashboard() {
  const k = DATA.kpis;
  const main = DATA.strategies[0];
  const last3 = DATA.last3;

  // Per-symbol P&L for the breakdown
  const bySym = {};
  DATA.trades.forEach(t => {
    if (!bySym[t.symbol]) bySym[t.symbol] = { pnl: 0, wins: 0, total: 0 };
    bySym[t.symbol].pnl += t.pnl;
    bySym[t.symbol].total += 1;
    if (t.pnl > 0) bySym[t.symbol].wins += 1;
  });
  const symbolsSorted = Object.entries(bySym).sort((a, b) => b[1].pnl - a[1].pnl);

  return `
    <!-- Top bar -->
    <div class="flex items-center justify-between mb-7">
      <div>
        <div class="kpi-label mb-2 flex items-center gap-2">
          <span class="live-dot"></span> Live Dashboard
        </div>
        <h1 class="page-title">Welcome back, <span class="brand-text">Paul</span></h1>
        <p class="text-sm mt-2" style="color: var(--text-mid);">
          ${main.name} · ${k.timeframe_entry || '1H'} Entries · Backtest ${k.data_period_start} → ${k.data_period_end}
        </p>
      </div>
      <div class="flex gap-2">
        <span class="badge badge-brand">v3 FINAL</span>
        <span class="badge badge-backtest">Backtest</span>
      </div>
    </div>

    <!-- Hero card: total equity + sparkline -->
    <div class="glass p-7 mb-4 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-96 h-96 rounded-full" style="background: radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%); pointer-events: none;"></div>
      <div class="grid grid-cols-2 gap-8 relative z-10">
        <div>
          <div class="kpi-label">Account Equity</div>
          <div class="kpi-value hero num mt-3 ${cls(k.total_return_pct)}">
            $${k.end_equity.toLocaleString()}
          </div>
          <div class="flex items-center gap-3 mt-4">
            <span class="badge ${cls(k.total_return_pct) === 'win' ? 'badge-win' : 'badge-loss'}" style="font-size: 13px; padding: 6px 12px;">
              ${arrow(k.total_return_pct)} ${Math.abs(k.total_return_pct).toFixed(2)}%
            </span>
            <span class="text-sm num" style="color: var(--text-mid);">
              ${arrow(k.total_return_pct)} $${Math.abs(k.end_equity - k.starting_equity).toLocaleString()} seit Start
            </span>
          </div>
          <div class="flex items-center gap-6 mt-6 pt-6 border-t" style="border-color: var(--border);">
            <div>
              <div class="kpi-label">Start</div>
              <div class="text-xl font-bold num mt-1">$${k.starting_equity.toLocaleString()}</div>
            </div>
            <div>
              <div class="kpi-label">CAGR</div>
              <div class="text-xl font-bold num mt-1 ${cls(k.cagr_pct)}">${arrow(k.cagr_pct)} ${Math.abs(k.cagr_pct).toFixed(2)}%</div>
            </div>
            <div>
              <div class="kpi-label">Periode</div>
              <div class="text-xl font-bold num mt-1">${k.data_years}<span class="kpi-unit">J</span></div>
            </div>
          </div>
        </div>
        <div>
          <div class="kpi-label">Equity Trend</div>
          <canvas id="hero-spark" style="height: 200px; margin-top: 8px;"></canvas>
        </div>
      </div>
    </div>

    <!-- 4 KPI cards with sparklines -->
    <div class="grid grid-cols-4 gap-4 mb-4">
      <div class="glass p-5">
        <div class="flex items-start justify-between">

const TRADES_STATE = { sort: "n", asc: true, filter: { symbol: "all", result: "all", search: "" } };
function filteredTrades() {
  let t = DATA.trades.slice();
  const f = TRADES_STATE.filter;
  if (f.symbol !== "all") t = t.filter(x => x.symbol === f.symbol);
  if (f.result === "win") t = t.filter(x => x.pnl > 0);
  if (f.result === "loss") t = t.filter(x => x.pnl < 0);
  if (f.search) {
    const q = f.search.toLowerCase();
    t = t.filter(x => (x.symbol+x.exit_reason+x.confluences).toLowerCase().includes(q));
  }
  const key = TRADES_STATE.sort;
  t.sort((a,b) => {
    const va = a[key], vb = b[key];
    if (typeof va === "string") return TRADES_STATE.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    return TRADES_STATE.asc ? va - vb : vb - va;
  });
  return t;
}
function viewTrades() {
  const trades = filteredTrades();
  const symbols = ["all", ...new Set(DATA.trades.map(t => t.symbol))];
  const totalPnl = trades.reduce((a,b)=>a+b.pnl, 0);
  const wins = trades.filter(t => t.pnl > 0).length;
  return `
    <div class="mb-7">
      <div class="kpi-label mb-2">Backtest</div>

      <p class="text-sm mt-2" style="color: var(--text-mid)">${trades.length} von ${DATA.trades.length} · ${wins} Wins · <span class="${cls(totalPnl)} font-semibold">${fmtMoney(totalPnl, true)}</span></p>

      <select class="field" onchange="TRADES_STATE.filter.symbol = this.value; render()" style="max-width: 180px">
        ${symbols.map(s => `<option value="${s}" ${s===TRADES_STATE.filter.symbol?'selected':''}>${s === 'all' ? 'Alle Symbole' : s}</option>`).join("")}
      </select>

        <option value="all" ${TRADES_STATE.filter.result==='all'?'selected':''}>Alle Ergebnisse</option>
        <option value="win" ${TRADES_STATE.filter.result==='win'?'selected':''}>Gewinner</option>
        <option value="loss" ${TRADES_STATE.filter.result==='loss'?'selected':''}>Verlierer</option>

    <div class="glass overflow-hidden">
      <div style="max-height: 70vh; overflow-y: auto" class="scroll-thin">
        <table class="dt">
          <thead>
            <tr>
              <th onclick="sortTrades('n')">#</th>
              <th onclick="sortTrades('entry_time')">Entry</th>

              <th>Chart</th>
            </tr>
          </thead>
          <tbody>
            ${trades.map(t => `
              <tr>
                <td class="num" style="color: var(--text-faint)">${t.n}</td>
                <td class="num mono">${t.entry_time}</td>
                <td class="font-bold">${t.symbol}</td>

function sortTrades(key) {
  if (TRADES_STATE.sort === key) TRADES_STATE.asc = !TRADES_STATE.asc;

  render();
}

const SESSIONS = ["Asia", "London", "New York AM", "New York PM", "London Close", "Other"];
const QUARTERS = ["Q1 (Jan-Mar)", "Q2 (Apr-Jun)", "Q3 (Jul-Sep)", "Q4 (Oct-Dec)"];
const OUTCOMES = ["Win", "Loss", "Break-even"];
const DIRECTIONS = ["Long", "Short"];

function filteredJournal() {
  let entries = JOURNAL_STATE.entries.slice();
  const f = JOURNAL_STATE.filter;
  if (f.outcome !== "all") entries = entries.filter(e => e.outcome === f.outcome);
  if (f.instrument !== "all") entries = entries.filter(e => e.instrument === f.instrument);
  if (f.search) {
    const q = f.search.toLowerCase();
    entries = entries.filter(e =>
      (e.instrument + " " + e.point_of_interest + " " + e.mistakes + " " + e.improvements + " " + e.confirmations).toLowerCase().includes(q)
    );
  }
  const key = JOURNAL_STATE.sort.key;
  entries.sort((a, b) => {
    const va = (a[key] || ""), vb = (b[key] || "");
    if (key === "pnl_dollar" || key === "pnl_pct") {
      return JOURNAL_STATE.sort.asc ? (parseFloat(va) || 0) - (parseFloat(vb) || 0) : (parseFloat(vb) || 0) - (parseFloat(va) || 0);
    }
    return JOURNAL_STATE.sort.asc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
  return entries;
}
function sortJournal(key) {
  if (JOURNAL_STATE.sort.key === key) JOURNAL_STATE.sort.asc = !JOURNAL_STATE.sort.asc;
  else { JOURNAL_STATE.sort.key = key; JOURNAL_STATE.sort.asc = false; }
  render();
}

        <div class="glass p-4"><div class="kpi-label">Total Entries</div><div class="kpi-value small num mt-2">${total}</div></div>
        <div class="glass p-4"><div class="kpi-label">Wins / Losses</div><div class="kpi-value small mt-2"><span class="win">${wins}</span><span style="color: var(--text-faint);"> / </span><span class="loss">${losses}</span></div></div>
        <div class="glass p-4"><div class="kpi-label">Winrate</div><div class="kpi-value small num mt-2">${winrate.toFixed(1)}<span class="kpi-unit">%</span></div></div>
        <div class="glass p-4"><div class="kpi-label">Net P&L</div><div class="kpi-value small num mt-2 ${cls(totalPnl)}">${fmtMoney(totalPnl, true)}</div></div>
      </div>
      <div class="flex items-center gap-3 mb-5">
        <input type="text" class="field" placeholder="Suche..." value="${escapeHtml(JOURNAL_STATE.filter.search)}" oninput="JOURNAL_STATE.filter.search = this.value; render()" style="max-width: 360px">
        <select class="field" onchange="JOURNAL_STATE.filter.instrument = this.value; render()" style="max-width: 180px">
          <option value="all">Alle Instrumente</option>
          ${INSTRUMENTS.map(i => `<option value="${i}" ${i===JOURNAL_STATE.filter.instrument?'selected':''}>${i}</option>`).join("")}
        </select>
        <select class="field" onchange="JOURNAL_STATE.filter.outcome = this.value; render()" style="max-width: 180px">
          <option value="all">Alle Ergebnisse</option>
          ${OUTCOMES.map(o => `<option value="${o}" ${o===JOURNAL_STATE.filter.outcome?'selected':''}>${o}</option>`).join("")}
        </select>
      </div>
    ` : ''}
    ${entries.length === 0 ? `
      <div class="glass p-16 text-center">
        <div class="text-xl font-bold mb-2" style="color: var(--text-mid);">${total === 0 ? 'Noch keine Einträge' : 'Keine Treffer'}</div>
        <p class="text-sm mb-6" style="color: var(--text-dim)">${total === 0 ? 'Starte dein Trade-Journal mit dem ersten Eintrag.' : 'Filter anpassen oder zurücksetzen.'}</p>
        ${total === 0 ? '<button class="btn" onclick="openJournalForm()">+ Ersten Eintrag erstellen</button>' : ''}
      </div>
    ` : `
      <div class="glass overflow-hidden">
        <div style="max-height: 70vh; overflow-y: auto; overflow-x: auto;" class="scroll-thin">
          <table class="dt">
            <thead>
              <tr>
                <th onclick="sortJournal('date')">Datum</th>
                <th onclick="sortJournal('instrument')">Instrument</th>
                <th onclick="sortJournal('session')">Session</th>
                <th onclick="sortJournal('quarter')">Quarter</th>
                <th onclick="sortJournal('direction')">Side</th>
                <th>Point of Interest</th>
                <th onclick="sortJournal('hold_duration')">Hold</th>
                <th onclick="sortJournal('rr')">R:R</th>
                <th onclick="sortJournal('outcome')">Outcome</th>
                <th onclick="sortJournal('pnl_dollar')" style="text-align: right">P&L $</th>
                <th onclick="sortJournal('pnl_pct')" style="text-align: right">P&L %</th>
                <th>Charts</th>
                <th style="text-align: right">Aktionen</th>
              </tr>
            </thead>
            <tbody>
              ${entries.map(e => renderJournalRow(e)).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `}
  `;
}
function renderJournalRow(e) {
  const pnl = parseFloat(e.pnl_dollar) || 0;
  const pnlPct = parseFloat(e.pnl_pct) || 0;
  const chartCount = ["chart_htf", "chart_before", "chart_after"].filter(k => e[k]).length;
  return `
    <tr onclick="openJournalDetail('${e.id}')">
      <td class="num mono font-semibold">${e.date || '—'}</td>
      <td class="font-bold">${escapeHtml(e.instrument || '—')}</td>
      <td><span class="pill">${escapeHtml(e.session || '—')}</span></td>
      <td class="text-xs" style="color: var(--text-mid)">${escapeHtml((e.quarter || '').slice(0,2))}</td>
      <td>${e.direction ? `<span class="badge ${e.direction === 'Long' ? 'badge-long' : 'badge-short'}">${e.direction === 'Long' ? '↑ L' : '↓ S'}</span>` : '—'}</td>
      <td class="wrap" style="color: var(--text-mid)">${escapeHtml((e.point_of_interest || '—').slice(0,80))}${(e.point_of_interest || '').length > 80 ? '…' : ''}</td>
      <td class="num text-xs" style="color: var(--text-mid)">${escapeHtml(e.hold_duration || '—')}</td>
      <td class="num font-semibold">${escapeHtml(e.rr || '—')}</td>
      <td>${e.outcome ? `<span class="badge ${e.outcome === 'Win' ? 'badge-win' : e.outcome === 'Loss' ? 'badge-loss' : 'badge-neutral'}">${e.outcome}</span>` : '—'}</td>
      <td class="num font-bold ${cls(pnl)}" style="text-align: right">${e.pnl_dollar ? fmtMoney(pnl, true) : '—'}</td>
      <td class="num font-semibold ${cls(pnlPct)}" style="text-align: right">${e.pnl_pct ? (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%' : '—'}</td>
      <td><span class="pill">${chartCount}/3</span></td>
      <td style="text-align: right"><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); openJournalForm('${e.id}')" style="padding: 4px 10px; font-size: 11px;">Edit</button></td>
    </tr>
  `;
}
function openJournalDetail(id) {
  const entry = JOURNAL_STATE.entries.find(e => e.id === id);
  if (!entry) return;
  JOURNAL_STATE.detailView = entry;
  renderJournalDetailModal();
}
function closeJournalDetail() {
  JOURNAL_STATE.detailView = null;
  document.getElementById("journal-modal").style.display = "none";
  document.getElementById("journal-modal").innerHTML = "";
}
function renderJournalDetailModal() {
  const e = JOURNAL_STATE.detailView; if (!e) return;
  const modal = document.getElementById("journal-modal");
  modal.style.display = "flex"; modal.className = "modal-bg";
  const pnl = parseFloat(e.pnl_dollar) || 0; const pnlPct = parseFloat(e.pnl_pct) || 0;
  const field = (label, value, mono = false) => `<div><div class="kpi-label mb-2">${label}</div><div class="${mono ? 'mono num font-semibold' : 'text-sm'}" style="color: ${value ? 'var(--text)' : 'var(--text-faint)'}; line-height: 1.6;">${escapeHtml(value || '—')}</div></div>`;
  const img = (label, src) => src ? `<div><div class="kpi-label mb-2">${label}</div><div class="glass-soft p-2"><img src="${src}" style="width: 100%; max-height: 360px; object-fit: contain; border-radius: 4px;"></div></div>` : '';
  modal.innerHTML = `
    <div class="modal scroll-thin">
      <div class="p-7 border-b" style="border-color: var(--border)">
        <div class="flex items-center justify-between">
          <div>
            <div class="kpi-label mb-1">Journal Entry · ${e.date || ''}</div>
            <div class="flex items-center gap-3">
              <h2 class="font-bold" style="font-size: 24px;">${escapeHtml(e.instrument || '—')}</h2>
              ${e.direction ? `<span class="badge ${e.direction === 'Long' ? 'badge-long' : 'badge-short'}">${e.direction === 'Long' ? '↑ Long' : '↓ Short'}</span>` : ''}
              ${e.outcome ? `<span class="badge ${e.outcome === 'Win' ? 'badge-win' : e.outcome === 'Loss' ? 'badge-loss' : 'badge-neutral'}">${e.outcome}</span>` : ''}
            </div>
            <div class="flex items-center gap-5 mt-3">
              <div><span class="kpi-label">P&L</span> <span class="font-bold ml-2 ${cls(pnl)}" style="font-size: 18px;">${e.pnl_dollar ? fmtMoney(pnl, true) : '—'}</span></div>
              <div><span class="kpi-label">%</span> <span class="font-bold ml-2 ${cls(pnlPct)}" style="font-size: 16px;">${e.pnl_pct ? (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%' : '—'}</span></div>
              <div><span class="kpi-label">R:R</span> <span class="font-bold ml-2" style="font-size: 16px;">${escapeHtml(e.rr || '—')}</span></div>
            </div>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" onclick="closeJournalDetail(); openJournalForm('${e.id}')">Bearbeiten</button>
            <button class="btn btn-danger btn-sm" onclick="if(confirm('Löschen?')){ deleteJournalEntry('${e.id}'); closeJournalDetail(); }">Löschen</button>
            <button class="btn btn-ghost btn-sm" onclick="closeJournalDetail()">✕</button>
          </div>
        </div>
      </div>
      <div class="p-7">
        <div class="section-title">Trade Info</div>
        <div class="grid grid-cols-4 gap-5">${field("Datum", e.date)}${field("Session", e.session)}${field("Quarter", e.quarter)}${field("Hold Duration", e.hold_duration)}</div>
        <div class="section-title">Strategy & Setup</div>
        <div class="grid grid-cols-2 gap-5">${field("Point of Interest", e.point_of_interest)}${field("Management Strategy", e.management)}${field("Confirmations", e.confirmations)}${field("Executions", e.executions)}${field("Stop Loss Placement", e.sl_placement)}${field("Take Profit Placement", e.tp_placement)}</div>
        ${(e.chart_htf || e.chart_before || e.chart_after) ? `<div class="section-title">Charts</div><div class="grid grid-cols-3 gap-4">${img("Higher Time Frame", e.chart_htf)}${img("Before", e.chart_before)}${img("After", e.chart_after)}</div>` : ''}
        <div class="section-title">Reflection</div>
        <div class="grid grid-cols-3 gap-5">${field("Emotions", e.emotions)}${field("Mistakes", e.mistakes)}${field("Improvements", e.improvements)}</div>
      </div>
    </div>`;
}
function deleteJournalEntry(id) {
  JOURNAL_STATE.entries = JOURNAL_STATE.entries.filter(e => e.id !== id);
  saveJournal(); render();
}
function openJournalForm(id) {
  const entry = id ? JOURNAL_STATE.entries.find(e => e.id === id) : {};
  JOURNAL_STATE.editing = { ...entry };
  if (!JOURNAL_STATE.editing.id) JOURNAL_STATE.editing.id = uid();
  if (!JOURNAL_STATE.editing.date) JOURNAL_STATE.editing.date = new Date().toISOString().slice(0,10);
  JOURNAL_STATE.detailView = null;
  renderJournalFormModal();
}
function closeJournalForm() {
  JOURNAL_STATE.editing = null;
  document.getElementById("journal-modal").style.display = "none";
  document.getElementById("journal-modal").innerHTML = "";
}
function updateField(key, val) { if (JOURNAL_STATE.editing) JOURNAL_STATE.editing[key] = val; }
async function uploadField(key, fileInput) {
  if (!fileInput.files || !fileInput.files[0]) return;
  try {
    const dataUrl = await readImageAsBase64(fileInput.files[0]);
    JOURNAL_STATE.editing[key] = dataUrl;
    renderJournalFormModal();
  } catch (e) { alert("Bild konnte nicht geladen werden: " + e.message); }
}
function removeImageField(key) {
  if (!JOURNAL_STATE.editing) return;
  delete JOURNAL_STATE.editing[key];
  renderJournalFormModal();
}
function saveJournalEntry() {
  const e = JOURNAL_STATE.editing; if (!e) return;
  const idx = JOURNAL_STATE.entries.findIndex(x => x.id === e.id);
  if (idx >= 0) JOURNAL_STATE.entries[idx] = e;
  else JOURNAL_STATE.entries.push(e);
  try { saveJournal(); }
  catch (err) { alert("Speichern fehlgeschlagen — lokaler Speicher voll. Bilder kleiner."); return; }
  closeJournalForm(); render();
}
function renderJournalFormModal() {
  const e = JOURNAL_STATE.editing; if (!e) return;
  const modal = document.getElementById("journal-modal");
  modal.style.display = "flex"; modal.className = "modal-bg";
  const input = (key, label, type = "text", placeholder = "") => `<div><label class="field-label">${label}</label><input type="${type}" class="field" value="${escapeHtml(e[key] || '')}" placeholder="${placeholder}" oninput="updateField('${key}', this.value)"></div>`;
  const select = (key, label, options) => `<div><label class="field-label">${label}</label><select class="field" onchange="updateField('${key}', this.value)"><option value="">— wählen —</option>${options.map(o => `<option value="${o}" ${e[key]===o?'selected':''}>${o}</option>`).join("")}</select></div>`;
  const textarea = (key, label, placeholder = "", rows = 3) => `<div><label class="field-label">${label}</label><textarea class="field" rows="${rows}" placeholder="${placeholder}" oninput="updateField('${key}', this.value)">${escapeHtml(e[key] || '')}</textarea></div>`;
  const imgUpload = (key, label) => `<div><label class="field-label">${label}</label><div class="img-drop ${e[key] ? 'has-image' : ''}" onclick="${e[key] ? '' : `document.getElementById('file-${key}').click()`}">${e[key] ? `<img src="${e[key]}"><button class="img-remove" onclick="event.stopPropagation(); removeImageField('${key}')">×</button>` : `<div><div style="color: var(--text-mid); font-size: 13px; font-weight: 500;">+ Bild hochladen</div><div style="color: var(--text-dim); font-size: 11px; margin-top: 4px;">PNG, JPG · max 1400px</div></div>`}</div><input id="file-${key}" type="file" accept="image/*" style="display: none" onchange="uploadField('${key}', this)"></div>`;
  modal.innerHTML = `
    <div class="modal scroll-thin">
      <div class="p-7 border-b" style="border-color: var(--border)">
        <div class="flex items-center justify-between">
          <div>
            <div class="kpi-label mb-1">Journal Entry</div>
            <h2 class="font-bold" style="font-size: 22px;">${JOURNAL_STATE.entries.find(x => x.id === e.id) ? 'Eintrag bearbeiten' : 'Neuer Eintrag'}</h2>
          </div>
          <button class="btn-ghost btn btn-sm" onclick="closeJournalForm()">✕ Schließen</button>
        </div>
      </div>
      <div class="p-7">
        <div class="section-title">Trade Info</div>
        <div class="grid grid-cols-3 gap-4">${input("date", "Datum", "date")}${select("instrument", "Instrument / Future", INSTRUMENTS)}${select("session", "Session", SESSIONS)}${select("quarter", "Quarter", QUARTERS)}${select("direction", "Direction", DIRECTIONS)}${input("point_of_interest", "Point of Interest", "text", "z.B. OB auf 4H bei 5230")}</div>
        <div class="section-title">Strategy & Setup</div>
        <div class="grid grid-cols-2 gap-4">${textarea("confirmations", "Confirmations", "z.B. FVG im OB, BOS auf 1H...")}${textarea("executions", "Executions", "z.B. Entry am BOS-Close, 3 Partials...")}${input("sl_placement", "Stop Loss Placement", "text", "unter OB-Low minus 0.5×ATR")}${input("tp_placement", "Take Profit Placement", "text", "TP1 1R, TP3 PAL, TP2 mid")}${textarea("management", "Management Strategy", "z.B. SL→BE bei TP1, Trail nach TP2...")}</div>
        <div class="section-title">Execution</div>
        <div class="grid grid-cols-5 gap-4">${input("hold_duration", "Hold Duration", "text", "4h 20min")}${input("rr", "Risk to Reward", "text", "1:3")}${select("outcome", "Outcome", OUTCOMES)}${input("pnl_dollar", "P&L ($)", "number", "312.50")}${input("pnl_pct", "P&L (%)", "number", "3.12")}</div>
        <div class="section-title">Charts</div>
        <div class="grid grid-cols-3 gap-4">${imgUpload("chart_htf", "Higher Time Frame")}${imgUpload("chart_before", "Chart Before")}${imgUpload("chart_after", "Chart After")}</div>
        <div class="section-title">Reflection</div>
        <div class="grid grid-cols-3 gap-4">${textarea("emotions", "Emotions", "Wie hast du dich gefühlt?")}${textarea("mistakes", "Mistakes", "Was war nicht regelkonform?")}${textarea("improvements", "Improvements", "Was machst du beim nächsten Trade besser?")}</div>
        <div class="flex justify-end gap-3 mt-8 pt-5 border-t" style="border-color: var(--border)">
          <button class="btn btn-ghost" onclick="closeJournalForm()">Abbrechen</button>
          <button class="btn" onclick="saveJournalEntry()">Eintrag speichern</button>
        </div>
      </div>
    </div>`;
}

// ============================================================
// Bots
// ============================================================
function viewBots() {
  return `
    <div class="flex items-end justify-between mb-7">
      <div>
        <div class="kpi-label mb-2">Automation</div>
        <h1 class="page-title">Trading Bots</h1>
        <p class="text-sm mt-2" style="color: var(--text-mid)">${STATE.bots.length} ${STATE.bots.length !== 1 ? 'Bots' : 'Bot'}</p>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="if(confirm('Reset?')) resetBots()">Reset</button>
    </div>
    <div class="panel-stack">
      ${STATE.bots.map((b, idx) => renderBotCard(b, idx)).join("")}
    </div>`;
}
function renderBotCard(b, idx) {
  const p = b.performance;
  return `
    <div class="glass p-7">
      <div class="flex items-start justify-between mb-6">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <h2 class="font-bold" style="font-size: 22px; letter-spacing: -0.01em;">${b.name}</h2>
            <span class="badge ${b.status === 'live' ? 'badge-live' : 'badge-backtest'}">${b.status === 'live' ? 'Live' : 'Backtest'}</span>
          </div>
          <p class="text-sm" style="color: var(--text-mid)">${b.description}</p>
          <p class="text-xs mt-2 mono" style="color: var(--text-dim)">Strategy: ${b.strategy_id}</p>
        </div>
        <button class="btn btn-ghost btn-sm" onclick='exportBot(${idx})'>Export YAML</button>
      </div>
      <div class="grid grid-cols-5 gap-3 mb-6">
        <div class="glass-soft p-4"><div class="kpi-label">Trades</div><div class="text-xl font-bold num mt-2">${p.trades}</div></div>
        <div class="glass-soft p-4"><div class="kpi-label">Winrate</div><div class="text-xl font-bold num mt-2">${p.winrate}%</div></div>
        <div class="glass-soft p-4"><div class="kpi-label">Total Return</div><div class="text-xl font-bold num mt-2 ${cls(p.total_return_pct)}">${fmtPct(p.total_return_pct)}</div></div>
        <div class="glass-soft p-4"><div class="kpi-label">CAGR</div><div class="text-xl font-bold num mt-2 ${cls(p.cagr_pct)}">${fmtPct(p.cagr_pct)}</div></div>
        <div class="glass-soft p-4"><div class="kpi-label">Max DD</div><div class="text-xl font-bold num mt-2 loss">${p.max_dd_pct.toFixed(1)}%</div></div>
      </div>
      <div>
        <div class="kpi-label mb-3">Parameter</div>
        <div class="grid grid-cols-3 gap-3">
          ${Object.entries(b.params).filter(([k,v]) => typeof v !== 'object').map(([k,v]) => `
            <div>
              <label class="field-label">${k}</label>
              <input class="field" type="${typeof v === 'number' ? 'number' : 'text'}" step="${typeof v === 'number' ? '0.1' : '1'}" value="${v}" onchange="updateBotParam(${idx}, '${k}', this.value, '${typeof v}')">
            </div>
          `).join("")}
        </div>
      </div>
    </div>`;
}
function updateBotParam(botIdx, key, value, type) {
  STATE.bots[botIdx].params[key] = type === "number" ? parseFloat(value) : value;
  saveBots();
}
function exportBot(idx) {
  const b = STATE.bots[idx];
  const yaml = Object.entries(b.params).map(([k,v]) => `  ${k}: ${JSON.stringify(v)}`).join("\n");
  const text = `# ${b.name}\nstrategy: ${b.strategy_id}\nparams:\n${yaml}\n`;
  const blob = new Blob([text], { type: "text/yaml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${b.id}.yaml`; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// Render
// ============================================================
function render() {
  const route = currentRoute();
  document.querySelectorAll(".nav-item[data-route]").forEach(el => {
    el.classList.toggle("active", el.dataset.route === route);
    if (!el.hasAttribute("data-bound")) {
      el.setAttribute("data-bound", "1");
      el.addEventListener("click", (ev) => { ev.preventDefault(); navigate(el.dataset.route); });
    }
  });
  const root = document.getElementById("view-root");
  if (route === "dashboard") { root.innerHTML = viewDashboard(); renderDashboardCharts(); }
  else if (route === "strategien") { root.innerHTML = viewStrategien(); }
  else if (route === "trades") { root.innerHTML = viewTrades(); }
  else if (route === "journal") { root.innerHTML = viewJournal(); }
  else if (route === "bots") { root.innerHTML = viewBots(); }
  root.querySelectorAll("[data-route]").forEach(el => {
    el.addEventListener("click", (ev) => { ev.preventDefault(); navigate(el.dataset.route); });
  });
  document.getElementById("footer-period").textContent = `${DATA.kpis.data_period_start} → ${DATA.kpis.data_period_end}`;
}
render();
</script>
</body>
</html>
