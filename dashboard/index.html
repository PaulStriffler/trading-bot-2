<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trading Desk · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
  :root {
    --bg: #08080a;
    --bg-soft: #0c0c10;
    --panel: #111114;
    --panel-2: #17171c;
    --panel-3: #1e1e24;
    --border: #23232b;
    --border-soft: #1c1c22;
    --border-strong: #2e2e38;
    --text: #ffffff;
    --text-mid: #b3b3bc;
    --text-dim: #7d7d88;
    --text-faint: #4a4a55;
    --accent: #60a5fa;
    --accent-soft: rgba(96,165,250,0.12);
    --win: #34d399;
    --win-bg: rgba(52,211,153,0.14);
    --loss: #f87171;
    --loss-bg: rgba(248,113,113,0.14);
    --warn: #fbbf24;
    --warn-bg: rgba(251,191,36,0.14);
  }
  * { box-sizing: border-box; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  body { font-weight: 400; font-size: 14px; letter-spacing: -0.005em; }

  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 13px; }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
  .panel-soft { background: var(--panel-2); border: 1px solid var(--border-soft); border-radius: 6px; }

  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); font-weight: 600; }
  .kpi-value {
    font-size: 36px; font-weight: 700; letter-spacing: -0.03em;
    margin-top: 6px; line-height: 1.05; font-feature-settings: "tnum" 1;
  }
  .kpi-value.small { font-size: 26px; }
  .kpi-unit { font-size: 18px; color: var(--text-dim); font-weight: 500; margin-left: 2px; }

  .win { color: var(--win); }
  .loss { color: var(--loss); }
  .num { font-variant-numeric: tabular-nums; }

  /* Page title */
  h1.page-title {
    font-size: 30px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.1;
  }
  .page-subtitle { font-size: 14px; color: var(--text-mid); margin-top: 6px; }

  /* Sidebar */
  .sidebar { background: var(--bg-soft); border-color: var(--border); }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 16px; cursor: pointer;
    color: var(--text-mid); font-size: 14px; font-weight: 500;
    border-left: 3px solid transparent;
    transition: all 0.12s;
  }
  .nav-item:hover { color: var(--text); background: var(--panel-2); }
  .nav-item.active {
    color: var(--text); border-left-color: var(--accent);
    background: linear-gradient(90deg, var(--accent-soft), transparent 60%);
  }
  .nav-item.active .nav-icon { color: var(--accent); }
  .nav-icon { width: 18px; height: 18px; flex-shrink: 0; color: var(--text-dim); }

  .brand-logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #000; font-size: 14px;
  }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 4px; font-size: 11px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge-active, .badge-live { color: var(--win); background: var(--win-bg); }
  .badge-planned, .badge-backtest { color: var(--warn); background: var(--warn-bg); }
  .badge-win, .badge-long { color: var(--win); background: var(--win-bg); }
  .badge-loss, .badge-short { color: var(--loss); background: var(--loss-bg); }
  .badge-neutral { color: var(--text-mid); background: var(--panel-3); }
  .pill {
    padding: 3px 9px; border-radius: 4px; font-size: 11px;
    font-weight: 500; background: var(--panel-3); color: var(--text-mid);
  }
  .pill-outline { background: transparent; border: 1px solid var(--border-strong); }

  /* Forms */
  input.field, select.field, textarea.field {
    background: var(--panel-2); border: 1px solid var(--border-strong); border-radius: 6px;
    padding: 10px 12px; color: var(--text); font-size: 13px; font-weight: 500;
    outline: none; transition: all 0.15s;
    font-family: inherit; width: 100%;
  }
  input.field:focus, select.field:focus, textarea.field:focus {
    border-color: var(--accent); background: var(--panel-3);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  input.field::placeholder, textarea.field::placeholder { color: var(--text-faint); }
  label.field-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); font-weight: 600; margin-bottom: 6px; display: block;
  }
  textarea.field { resize: vertical; min-height: 64px; line-height: 1.5; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent); color: #000; padding: 10px 18px; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    transition: all 0.15s; font-family: inherit;
  }
  .btn:hover { background: #3b82f6; transform: translateY(-1px); }
  .btn-ghost {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border-strong);
  }
  .btn-ghost:hover { border-color: var(--text-dim); background: var(--panel-3); transform: none; }
  .btn-danger {
    background: var(--loss-bg); color: var(--loss); border: 1px solid rgba(248,113,113,0.25);
  }
  .btn-danger:hover { background: rgba(248,113,113,0.2); transform: none; }
  .btn-sm { padding: 7px 14px; font-size: 12px; }

  /* Tables */
  table.dt { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.dt th {
    text-align: left; font-weight: 600; color: var(--text-dim);
    padding: 12px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border); background: var(--panel);
    position: sticky; top: 0; cursor: pointer; user-select: none; white-space: nowrap;
  }
  table.dt th:hover { color: var(--text); }
  table.dt td {
    padding: 13px 14px; border-bottom: 1px solid var(--border-soft);
    white-space: nowrap;
  }
  table.dt td.wrap { white-space: normal; max-width: 220px; }
  table.dt tbody tr { transition: background 0.1s; cursor: pointer; }
  table.dt tbody tr:hover { background: var(--panel-2); }
  table.dt tbody tr.expanded { background: var(--panel-2); }

  /* Scrollbars */
  .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }
  .scroll-thin::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; padding: 24px; backdrop-filter: blur(6px);
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border-strong); border-radius: 12px;
    width: 100%; max-width: 1080px; max-height: 92vh; overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }

  /* Image upload */
  .img-drop {
    border: 1px dashed var(--border-strong); border-radius: 6px;
    padding: 24px; text-align: center; cursor: pointer;
    transition: all 0.15s; background: var(--panel-2);
    min-height: 160px; display: flex; align-items: center; justify-content: center;
  }
  .img-drop:hover { border-color: var(--accent); background: var(--panel-3); }
  .img-drop.has-image { padding: 0; background: var(--bg); position: relative; overflow: hidden; }
  .img-drop img { max-width: 100%; max-height: 240px; display: block; margin: 0 auto; border-radius: 4px; }
  .img-remove {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.85); color: white; border: 1px solid var(--border-strong);
    width: 28px; height: 28px; border-radius: 14px; cursor: pointer;
    font-size: 14px; line-height: 1;
  }

  /* Section header inside modal */
  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--accent); font-weight: 700; margin: 28px 0 14px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .section-title:first-child { margin-top: 0; }

  /* Outcome cell */
  .outcome-cell {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 4px; font-weight: 600;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
  }

  /* Strategy/bot card spacing */
  .panel-stack > .panel { margin-bottom: 16px; }
  .panel-stack > .panel:last-child { margin-bottom: 0; }
</style>
</head>
<body class="min-h-screen">

<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-60 flex-shrink-0 border-r relative sidebar">
    <div class="p-5 border-b" style="border-color: var(--border);">
      <div class="flex items-center gap-3">
        <div class="brand-logo">P</div>
        <div>
          <div class="font-bold" style="font-size: 14px; letter-spacing: -0.01em;">Trading Desk</div>
          <div style="font-size: 11px; color: var(--text-dim); font-weight: 500;">ICT/SMC · v3 Final</div>
        </div>
      </div>
    </div>
    <nav class="py-3">
      <a class="nav-item" data-route="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>

      </a>
      <a class="nav-item" data-route="bots">

        Bots
      </a>
    </nav>

    <div class="absolute bottom-0 w-60 p-5 border-t" style="border-color: var(--border)">
      <div class="kpi-label" style="font-size: 10px;">Account</div>
      <div class="font-bold mt-1" style="font-size: 14px;">FTMO Swing $10k</div>
      <div class="kpi-label mt-3" style="font-size: 10px;">Backtest</div>
      <div class="num text-xs mt-1" style="color: var(--text-mid); font-weight: 500;" id="footer-period"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-x-auto scroll-thin">
    <div id="view-root" class="p-8"></div>
  </main>
</div>

<div id="journal-modal" style="display:none"></div>

<script>
// ============================================================
// State & persistence
// ============================================================
const STATE = { bots: loadBots() };
const JOURNAL_STATE = {
  entries: loadJournal(),
  editing: null,
  detailView: null,
  filter: { search: "", outcome: "all", instrument: "all" },
  sort: { key: "date", asc: false },
};

function loadBots() {
  const saved = localStorage.getItem("bots_v2");
  if (saved) { try { return JSON.parse(saved); } catch {} }
  return JSON.parse(JSON.stringify(window.DATA.bots));
}
function saveBots() { localStorage.setItem("bots_v2", JSON.stringify(STATE.bots)); }
function resetBots() {
  localStorage.removeItem("bots_v2");
  STATE.bots = loadBots(); render();
}
function loadJournal() {
  try { return JSON.parse(localStorage.getItem("journal_v1") || "[]"); }
  catch { return []; }
}
function saveJournal() { localStorage.setItem("journal_v1", JSON.stringify(JOURNAL_STATE.entries)); }

const ROUTES = ["dashboard", "strategien", "trades", "journal", "bots"];
function currentRoute() {
  const h = location.hash.replace("#", "");
  return ROUTES.includes(h) ? h : "dashboard";
}
function navigate(route) { location.hash = route; }
window.addEventListener("hashchange", render);

// ============================================================
// Helpers
// ============================================================
const fmtMoney = (n, sign = false) => {
  const num = Math.abs(n).toLocaleString("en-US", { maximumFractionDigits: 0 });
  return (n < 0 ? "-" : (sign && n > 0 ? "+" : "")) + "$" + num;
};
const fmtPct = (n, sign = true) => (sign && n > 0 ? "+" : "") + n.toFixed(1) + "%";
const cls = (n) => n >= 0 ? "win" : "loss";
const arrow = (n) => n >= 0 ? "↑" : "↓";
const uid = () => "j_" + Math.random().toString(36).slice(2, 10);

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

async function readImageAsBase64(file, maxWidth = 1400) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ratio = Math.min(1, maxWidth / img.width);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.82));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ============================================================
// View: Dashboard
// ============================================================
function viewDashboard() {
  const k = DATA.kpis;
  const main = DATA.strategies[0];
  const last3 = DATA.last3;
  const yearly = DATA.yearly || [];

  return `
    <div class="flex items-end justify-between mb-7">
      <div>
        <div class="kpi-label mb-2">Übersicht</div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">${main.name} · Entries auf ${k.timeframe_entry || '1H'} · ${k.data_period_start} → ${k.data_period_end}</p>
      </div>
      <div class="flex gap-2">
        <span class="badge badge-active">v3 FINAL</span>
        <span class="badge badge-backtest">Backtest-Modus</span>
      </div>
    </div>

    <!-- Hero KPIs -->
    <div class="grid grid-cols-4 gap-4 mb-4">
      <div class="panel p-5">
        <div class="kpi-label">Total Return</div>
        <div class="kpi-value num ${cls(k.total_return_pct)}">
          ${arrow(k.total_return_pct)} ${Math.abs(k.total_return_pct).toFixed(2)}<span class="kpi-unit">%</span>
        </div>
        <div class="text-xs mt-3 num" style="color: var(--text-mid);">
          $${k.starting_equity.toLocaleString()} → <span class="${cls(k.total_return_pct)} font-semibold">$${k.end_equity.toLocaleString()}</span>
        </div>
      </div>
      <div class="panel p-5">
        <div class="kpi-label">CAGR</div>
        <div class="kpi-value num ${cls(k.cagr_pct)}">
          ${arrow(k.cagr_pct)} ${Math.abs(k.cagr_pct).toFixed(2)}<span class="kpi-unit">%</span>
        </div>
        <div class="text-xs mt-3" style="color: var(--text-mid);">über ${k.data_years} Jahre</div>
      </div>
      <div class="panel p-5">
        <div class="kpi-label">Winrate</div>
        <div class="kpi-value num">${k.winrate.toFixed(1)}<span class="kpi-unit">%</span></div>
        <div class="text-xs mt-3" style="color: var(--text-mid);">
          <span class="win font-semibold">${k.wins}W</span> · <span class="loss font-semibold">${k.losses}L</span> · ${k.trades} Trades
        </div>
      </div>
      <div class="panel p-5">
        <div class="kpi-label">Max Drawdown</div>
        <div class="kpi-value num loss">↓ ${Math.abs(k.max_dd_pct).toFixed(1)}<span class="kpi-unit">%</span></div>
        <div class="text-xs mt-3" style="color: var(--text-mid);">Peak-to-Trough</div>
      </div>
    </div>

    <!-- Equity Curve + Yearly grid -->
    <div class="grid gap-4 mb-4" style="grid-template-columns: 2fr 1fr;">
      <div class="panel p-5">
        <div class="flex items-center justify-between mb-4">
          <div>
            <div class="kpi-label">Equity Curve</div>
            <div class="text-lg font-bold mt-1">Compound Wachstum</div>
          </div>
          <div class="text-right num">
            <div class="kpi-label">End Equity</div>
            <div class="text-2xl mt-1 font-bold ${cls(k.total_return_pct)}">$${k.end_equity.toLocaleString()}</div>
          </div>
        </div>
        <canvas id="equity-chart" style="max-height: 280px;"></canvas>
      </div>
      <div class="panel p-5">
        <div class="kpi-label">Performance pro Jahr</div>
        <div class="text-lg font-bold mt-1 mb-4">Yearly Returns</div>
        <canvas id="yearly-chart" style="max-height: 280px;"></canvas>
      </div>
    </div>

    <!-- Per-symbol breakdown + Last trades -->
    <div class="grid gap-4 mb-4" style="grid-template-columns: 1fr 2fr;">
      <div class="panel p-5">
        <div class="kpi-label">Performance pro Symbol</div>
        <div class="text-lg font-bold mt-1 mb-4">Symbol Breakdown</div>
        <canvas id="symbol-chart" style="max-height: 280px;"></canvas>
      </div>
      <div class="panel p-5">
        <div class="flex items-center justify-between mb-4">
          <div>
            <div class="kpi-label">Recent</div>
            <div class="text-lg font-bold mt-1">Letzte 3 Trades</div>
          </div>
          <a class="text-xs font-semibold" data-route="trades" style="color: var(--accent); cursor: pointer;">Alle ansehen →</a>
        </div>
        <div class="space-y-2">
          ${last3.map(t => `
            <div class="flex items-center justify-between py-3 px-4 panel-soft hover:bg-opacity-100" style="transition: background 0.1s;">
              <div class="flex items-center gap-4">
                <div style="min-width: 70px;">
                  <div class="text-xs mono font-semibold">${t.entry_time.slice(0,10)}</div>
                </div>
                <div style="min-width: 80px;">
                  <div class="font-bold">${t.symbol}</div>
                </div>
                <span class="badge ${t.direction === 'long' ? 'badge-long' : 'badge-short'}">${t.direction === 'long' ? '↑ Long' : '↓ Short'}</span>
                <span class="pill">${escapeHtml(t.exit_reason)}</span>
              </div>
              <div class="text-right">
                <div class="num font-bold ${cls(t.pnl)}" style="font-size: 16px;">${fmtMoney(t.pnl, true)}</div>
                <div class="num text-xs mt-1" style="color: var(--text-mid);">R ${t.rr >= 0 ? '+' : ''}${t.rr.toFixed(2)}</div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>

    <!-- Bottom mini-stats -->
    <div class="grid grid-cols-4 gap-4">
      <div class="panel p-4">
        <div class="kpi-label">Märkte</div>
        <div class="kpi-value small num mt-2">${k.n_symbols}</div>
        <div class="flex gap-1 mt-2 flex-wrap">
          ${k.symbols.map(s => `<span class="pill">${s}</span>`).join("")}
        </div>
      </div>
      <div class="panel p-4">
        <div class="kpi-label">Bars / Symbol</div>
        <div class="kpi-value small num mt-2">${(k.data_years * 252 * 6.5).toFixed(0)}</div>
        <div class="text-xs mt-2" style="color: var(--text-mid);">1H · ~${(k.data_years * 252).toFixed(0)} Trading-Tage</div>
      </div>
      <div class="panel p-4">
        <div class="kpi-label">Journal Entries</div>
        <div class="kpi-value small num mt-2">${JOURNAL_STATE.entries.length}</div>
        <div class="text-xs mt-2"><a data-route="journal" style="color: var(--accent); font-weight: 600; cursor: pointer;">Journal →</a></div>
      </div>
      <div class="panel p-4">
        <div class="kpi-label">Aktive Bots</div>
        <div class="kpi-value small num mt-2">${STATE.bots.filter(b => b.status === 'live').length} / ${STATE.bots.length}</div>
        <div class="text-xs mt-2"><a data-route="bots" style="color: var(--accent); font-weight: 600; cursor: pointer;">Bots verwalten →</a></div>
      </div>
    </div>
  `;
}

function renderDashboardCharts() {
  // Equity
  const eq = document.getElementById("equity-chart"); if (eq) {
    const data = DATA.equity_curve;
    new Chart(eq, {
      type: "line",
      data: {
        labels: data.map(p => p.date),
        datasets: [{
          data: data.map(p => p.equity),
          borderColor: "#60a5fa", borderWidth: 2,
          backgroundColor: ctx => {
            const c = ctx.chart.ctx; const g = c.createLinearGradient(0, 0, 0, 300);
            g.addColorStop(0, "rgba(96,165,250,0.30)"); g.addColorStop(1, "rgba(96,165,250,0)");
            return g;
          },
          fill: true, tension: 0.2,
          pointRadius: 0, pointHoverRadius: 5,
          pointHoverBackgroundColor: "#60a5fa",
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#111114", borderColor: "#2e2e38", borderWidth: 1, padding: 10,
            displayColors: false, titleColor: "#b3b3bc", bodyColor: "#fff",
            callbacks: { label: ctx => "$" + ctx.parsed.y.toLocaleString("en-US", { maximumFractionDigits: 0 }) }
          }
        },
        scales: {
          x: { grid: { color: "rgba(255,255,255,0.03)" }, ticks: { color: "#7d7d88", maxTicksLimit: 8, font: { size: 10, weight: 500 } } },
          y: { grid: { color: "rgba(255,255,255,0.04)" }, ticks: { color: "#7d7d88", font: { size: 10, weight: 500 }, callback: v => "$" + v.toLocaleString("en-US") } }
        }
      }
    });
  }

  // Yearly bars
  const yr = document.getElementById("yearly-chart");
  if (yr && DATA.yearly) {
    new Chart(yr, {
      type: "bar",
      data: {
        labels: DATA.yearly.map(y => y.year),
        datasets: [{
          data: DATA.yearly.map(y => y["return_%"]),
          backgroundColor: DATA.yearly.map(y => y["return_%"] >= 0 ? "rgba(52,211,153,0.85)" : "rgba(248,113,113,0.85)"),
          borderRadius: 4, borderSkipped: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#111114", borderColor: "#2e2e38", borderWidth: 1, padding: 10,
            displayColors: false, titleColor: "#b3b3bc", bodyColor: "#fff",
            callbacks: { label: ctx => `${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}%` }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: "#7d7d88", font: { size: 11, weight: 600 } } },
          y: { grid: { color: "rgba(255,255,255,0.04)" }, ticks: { color: "#7d7d88", font: { size: 10 }, callback: v => v + "%" } }
        }
      }
    });
  }

  // Per-symbol
  const sy = document.getElementById("symbol-chart");
  if (sy) {
    const bySym = {};
    DATA.trades.forEach(t => { bySym[t.symbol] = (bySym[t.symbol] || 0) + t.pnl; });
    const labels = Object.keys(bySym).sort();
    const values = labels.map(l => bySym[l]);
    new Chart(sy, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: values.map(v => v >= 0 ? "rgba(52,211,153,0.85)" : "rgba(248,113,113,0.85)"),
          borderRadius: 4, borderSkipped: false,
        }]
      },
      options: {
        indexAxis: "y",
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#111114", borderColor: "#2e2e38", borderWidth: 1, padding: 10,
            displayColors: false, titleColor: "#b3b3bc", bodyColor: "#fff",
            callbacks: { label: ctx => "$" + ctx.parsed.x.toLocaleString("en-US", { maximumFractionDigits: 0 }) }
          }
        },
        scales: {
          x: { grid: { color: "rgba(255,255,255,0.04)" }, ticks: { color: "#7d7d88", font: { size: 10 }, callback: v => "$" + v.toLocaleString("en-US") } },
          y: { grid: { display: false }, ticks: { color: "#fff", font: { size: 12, weight: 600 } } }
        }
      }
    });
  }
}

// ============================================================
// View: Backtest Trades
// ============================================================
const TRADES_STATE = { sort: "n", asc: true, filter: { symbol: "all", result: "all", search: "" } };

function filteredTrades() {
  let t = DATA.trades.slice();
  const f = TRADES_STATE.filter;
  if (f.symbol !== "all") t = t.filter(x => x.symbol === f.symbol);
  if (f.result === "win") t = t.filter(x => x.pnl > 0);
  if (f.result === "loss") t = t.filter(x => x.pnl < 0);
  if (f.search) {
    const q = f.search.toLowerCase();
    t = t.filter(x => (x.symbol+x.exit_reason+x.confluences).toLowerCase().includes(q));
  }
  const key = TRADES_STATE.sort;
  t.sort((a,b) => {
    const va = a[key], vb = b[key];
    if (typeof va === "string") return TRADES_STATE.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    return TRADES_STATE.asc ? va - vb : vb - va;
  });
  return t;
}

function viewTrades() {
  const trades = filteredTrades();
  const symbols = ["all", ...new Set(DATA.trades.map(t => t.symbol))];
  const totalPnl = trades.reduce((a,b)=>a+b.pnl, 0);
  const wins = trades.filter(t => t.pnl > 0).length;
  return `
    <div class="mb-7">
      <div class="kpi-label mb-2">Backtest</div>
      <h1 class="page-title">Trades</h1>
      <p class="page-subtitle">${trades.length} von ${DATA.trades.length} · ${wins} Wins · <span class="${cls(totalPnl)} font-semibold">${fmtMoney(totalPnl, true)}</span></p>
    </div>
    <div class="flex items-center gap-3 mb-5">
      <input type="text" class="field" placeholder="Suche..." value="${TRADES_STATE.filter.search}" oninput="TRADES_STATE.filter.search = this.value; render()" style="max-width: 280px">
      <select class="field" onchange="TRADES_STATE.filter.symbol = this.value; render()" style="max-width: 180px">
        ${symbols.map(s => `<option value="${s}" ${s===TRADES_STATE.filter.symbol?'selected':''}>${s === 'all' ? 'Alle Symbole' : s}</option>`).join("")}
      </select>
      <select class="field" onchange="TRADES_STATE.filter.result = this.value; render()" style="max-width: 180px">
        <option value="all" ${TRADES_STATE.filter.result==='all'?'selected':''}>Alle Ergebnisse</option>
        <option value="win" ${TRADES_STATE.filter.result==='win'?'selected':''}>Gewinner</option>
        <option value="loss" ${TRADES_STATE.filter.result==='loss'?'selected':''}>Verlierer</option>
      </select>
    </div>
    <div class="panel overflow-hidden">
      <div style="max-height: 70vh; overflow-y: auto" class="scroll-thin">
        <table class="dt">
          <thead>
            <tr>
              <th onclick="sortTrades('n')">#</th>
              <th onclick="sortTrades('entry_time')">Entry</th>
              <th onclick="sortTrades('symbol')">Symbol</th>
              <th onclick="sortTrades('direction')">Side</th>
              <th onclick="sortTrades('entry')">Preis</th>
              <th>Confluences</th>
              <th onclick="sortTrades('exit_reason')">Exit</th>
              <th onclick="sortTrades('rr')" style="text-align: right">R</th>
              <th onclick="sortTrades('pnl')" style="text-align: right">P&L</th>
              <th>Chart</th>
            </tr>
          </thead>
          <tbody>
            ${trades.map(t => `
              <tr>
                <td class="num" style="color: var(--text-faint)">${t.n}</td>
                <td class="num mono">${t.entry_time}</td>
                <td class="font-bold">${t.symbol}</td>
                <td><span class="badge ${t.direction === 'long' ? 'badge-long' : 'badge-short'}">${t.direction === 'long' ? '↑ L' : '↓ S'}</span></td>
                <td class="num mono">${t.entry.toFixed(1)}</td>
                <td class="text-xs wrap" style="color: var(--text-mid)">${t.confluences}</td>
                <td><span class="pill">${t.exit_reason}</span></td>
                <td class="num font-semibold ${cls(t.rr)}" style="text-align: right">${t.rr >= 0 ? '+' : ''}${t.rr.toFixed(2)}</td>
                <td class="num font-bold ${cls(t.pnl)}" style="text-align: right">${fmtMoney(t.pnl, true)}</td>
                <td><a href="${t.png}" target="_blank" class="font-semibold" style="color: var(--accent);">PNG →</a></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}
function sortTrades(key) {
  if (TRADES_STATE.sort === key) TRADES_STATE.asc = !TRADES_STATE.asc;
  else { TRADES_STATE.sort = key; TRADES_STATE.asc = true; }
  render();
}

// ============================================================
// View: Journal — TABLE LAYOUT
// ============================================================
const INSTRUMENTS = ["US500", "US30", "US100", "US2000", "ES", "YM", "NQ", "RTY", "GC", "CL", "Other"];
const SESSIONS = ["Asia", "London", "New York AM", "New York PM", "London Close", "Other"];
const QUARTERS = ["Q1 (Jan-Mar)", "Q2 (Apr-Jun)", "Q3 (Jul-Sep)", "Q4 (Oct-Dec)"];
const OUTCOMES = ["Win", "Loss", "Break-even"];
const DIRECTIONS = ["Long", "Short"];

function filteredJournal() {
  let entries = JOURNAL_STATE.entries.slice();
  const f = JOURNAL_STATE.filter;
  if (f.outcome !== "all") entries = entries.filter(e => e.outcome === f.outcome);
  if (f.instrument !== "all") entries = entries.filter(e => e.instrument === f.instrument);
  if (f.search) {
    const q = f.search.toLowerCase();
    entries = entries.filter(e =>
      (e.instrument + " " + e.point_of_interest + " " + e.mistakes + " " + e.improvements + " " + e.confirmations).toLowerCase().includes(q)
    );
  }
  const key = JOURNAL_STATE.sort.key;
  entries.sort((a, b) => {
    const va = (a[key] || ""), vb = (b[key] || "");
    if (key === "pnl_dollar" || key === "pnl_pct") {
      return JOURNAL_STATE.sort.asc ? (parseFloat(va) || 0) - (parseFloat(vb) || 0) : (parseFloat(vb) || 0) - (parseFloat(va) || 0);
    }
    return JOURNAL_STATE.sort.asc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
  return entries;
}

function sortJournal(key) {
  if (JOURNAL_STATE.sort.key === key) JOURNAL_STATE.sort.asc = !JOURNAL_STATE.sort.asc;
  else { JOURNAL_STATE.sort.key = key; JOURNAL_STATE.sort.asc = false; }
  render();
}

function viewJournal() {
  const entries = filteredJournal();
  const total = JOURNAL_STATE.entries.length;
  const wins = JOURNAL_STATE.entries.filter(e => e.outcome === "Win").length;
  const losses = JOURNAL_STATE.entries.filter(e => e.outcome === "Loss").length;
  const totalPnl = JOURNAL_STATE.entries.reduce((s, e) => s + (parseFloat(e.pnl_dollar) || 0), 0);
  const winrate = total > 0 ? (wins / total * 100) : 0;
  const avgRr = total > 0
    ? JOURNAL_STATE.entries.map(e => parseFloat(e.rr_numeric || 0)).filter(v => v > 0).reduce((a,b,_,arr) => a + b/arr.length, 0)
    : 0;

  return `
    <div class="flex items-end justify-between mb-7">
      <div>
        <div class="kpi-label mb-2">Trade Journal</div>
        <h1 class="page-title">Journal</h1>
        <p class="page-subtitle">${total} ${total === 1 ? 'Eintrag' : 'Einträge'}</p>
      </div>
      <button class="btn" onclick="openJournalForm()">+ Neuer Eintrag</button>
    </div>

    ${total > 0 ? `
      <!-- Journal KPIs -->
      <div class="grid grid-cols-4 gap-4 mb-5">
        <div class="panel p-4">
          <div class="kpi-label">Total Entries</div>
          <div class="kpi-value small num mt-2">${total}</div>
        </div>
        <div class="panel p-4">
          <div class="kpi-label">Wins / Losses</div>
          <div class="kpi-value small mt-2"><span class="win">${wins}</span><span style="color: var(--text-faint);"> / </span><span class="loss">${losses}</span></div>
        </div>
        <div class="panel p-4">
          <div class="kpi-label">Winrate</div>
          <div class="kpi-value small num mt-2">${winrate.toFixed(1)}<span class="kpi-unit">%</span></div>
        </div>
        <div class="panel p-4">
          <div class="kpi-label">Net P&L</div>
          <div class="kpi-value small num mt-2 ${cls(totalPnl)}">${fmtMoney(totalPnl, true)}</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="flex items-center gap-3 mb-5">
        <input type="text" class="field" placeholder="Suche in POI / Mistakes / Improvements..."
               value="${escapeHtml(JOURNAL_STATE.filter.search)}"
               oninput="JOURNAL_STATE.filter.search = this.value; render()"
               style="max-width: 360px">
        <select class="field" onchange="JOURNAL_STATE.filter.instrument = this.value; render()" style="max-width: 180px">
          <option value="all">Alle Instrumente</option>
          ${INSTRUMENTS.map(i => `<option value="${i}" ${i===JOURNAL_STATE.filter.instrument?'selected':''}>${i}</option>`).join("")}
        </select>
        <select class="field" onchange="JOURNAL_STATE.filter.outcome = this.value; render()" style="max-width: 180px">
          <option value="all">Alle Ergebnisse</option>
          ${OUTCOMES.map(o => `<option value="${o}" ${o===JOURNAL_STATE.filter.outcome?'selected':''}>${o}</option>`).join("")}
        </select>
      </div>
    ` : ''}

    ${entries.length === 0 ? `
      <div class="panel p-16 text-center">
        <div class="text-xl font-bold mb-2" style="color: var(--text-mid);">${total === 0 ? 'Noch keine Einträge' : 'Keine Treffer'}</div>
        <p class="text-sm mb-6" style="color: var(--text-dim)">${total === 0 ? 'Starte dein Trade-Journal mit dem ersten Eintrag.' : 'Filter anpassen oder zurücksetzen.'}</p>
        ${total === 0 ? '<button class="btn" onclick="openJournalForm()">+ Ersten Eintrag erstellen</button>' : ''}
      </div>
    ` : `
      <div class="panel overflow-hidden">
        <div style="max-height: 70vh; overflow-y: auto; overflow-x: auto;" class="scroll-thin">
          <table class="dt">
            <thead>
              <tr>
                <th onclick="sortJournal('date')">Datum</th>
                <th onclick="sortJournal('instrument')">Instrument</th>
                <th onclick="sortJournal('session')">Session</th>
                <th onclick="sortJournal('quarter')">Quarter</th>
                <th onclick="sortJournal('direction')">Side</th>
                <th>Point of Interest</th>
                <th onclick="sortJournal('hold_duration')">Hold</th>
                <th onclick="sortJournal('rr')">R:R</th>
                <th onclick="sortJournal('outcome')">Outcome</th>
                <th onclick="sortJournal('pnl_dollar')" style="text-align: right">P&L $</th>
                <th onclick="sortJournal('pnl_pct')" style="text-align: right">P&L %</th>
                <th>Charts</th>
                <th style="text-align: right">Aktionen</th>
              </tr>
            </thead>
            <tbody>
              ${entries.map(e => renderJournalRow(e)).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `}
  `;
}

function renderJournalRow(e) {
  const pnl = parseFloat(e.pnl_dollar) || 0;
  const pnlPct = parseFloat(e.pnl_pct) || 0;
  const chartCount = ["chart_htf", "chart_before", "chart_after"].filter(k => e[k]).length;
  return `
    <tr onclick="openJournalDetail('${e.id}')">
      <td class="num mono font-semibold">${e.date || '—'}</td>
      <td class="font-bold">${escapeHtml(e.instrument || '—')}</td>
      <td><span class="pill">${escapeHtml(e.session || '—')}</span></td>
      <td class="text-xs" style="color: var(--text-mid)">${escapeHtml((e.quarter || '').slice(0,2))}</td>
      <td>${e.direction ? `<span class="badge ${e.direction === 'Long' ? 'badge-long' : 'badge-short'}">${e.direction === 'Long' ? '↑ L' : '↓ S'}</span>` : '—'}</td>
      <td class="wrap" style="color: var(--text-mid)">${escapeHtml((e.point_of_interest || '—').slice(0,80))}${(e.point_of_interest || '').length > 80 ? '…' : ''}</td>
      <td class="num text-xs" style="color: var(--text-mid)">${escapeHtml(e.hold_duration || '—')}</td>
      <td class="num font-semibold">${escapeHtml(e.rr || '—')}</td>
      <td>${e.outcome ? `<span class="badge ${e.outcome === 'Win' ? 'badge-win' : e.outcome === 'Loss' ? 'badge-loss' : 'badge-neutral'}">${e.outcome}</span>` : '—'}</td>
      <td class="num font-bold ${cls(pnl)}" style="text-align: right">${e.pnl_dollar ? fmtMoney(pnl, true) : '—'}</td>
      <td class="num font-semibold ${cls(pnlPct)}" style="text-align: right">${e.pnl_pct ? (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%' : '—'}</td>
      <td><span class="pill">${chartCount}/3</span></td>
      <td style="text-align: right">
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); openJournalForm('${e.id}')" style="padding: 4px 10px; font-size: 11px;">Edit</button>
      </td>
    </tr>
  `;
}

function openJournalDetail(id) {
  const entry = JOURNAL_STATE.entries.find(e => e.id === id);
  if (!entry) return;
  JOURNAL_STATE.detailView = entry;
  renderJournalDetailModal();
}

function closeJournalDetail() {
  JOURNAL_STATE.detailView = null;
  document.getElementById("journal-modal").style.display = "none";
  document.getElementById("journal-modal").innerHTML = "";
}

            <div class="flex items-center gap-5 mt-3">
              <div><span class="kpi-label">P&L</span> <span class="font-bold ml-2 ${cls(pnl)}" style="font-size: 18px;">${e.pnl_dollar ? fmtMoney(pnl, true) : '—'}</span></div>
              <div><span class="kpi-label">%</span> <span class="font-bold ml-2 ${cls(pnlPct)}" style="font-size: 16px;">${e.pnl_pct ? (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%' : '—'}</span></div>
              <div><span class="kpi-label">R:R</span> <span class="font-bold ml-2" style="font-size: 16px;">${escapeHtml(e.rr || '—')}</span></div>
            </div>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" onclick="closeJournalDetail(); openJournalForm('${e.id}')">Bearbeiten</button>
            <button class="btn btn-danger btn-sm" onclick="if(confirm('Löschen?')){ deleteJournalEntry('${e.id}'); closeJournalDetail(); }">Löschen</button>
            <button class="btn btn-ghost btn-sm" onclick="closeJournalDetail()">✕</button>
          </div>
        </div>
      </div>

      <div class="p-7">
        <div class="section-title">Trade Info</div>
        <div class="grid grid-cols-4 gap-5">
          ${field("Datum", e.date)}
          ${field("Session", e.session)}
          ${field("Quarter", e.quarter)}
          ${field("Hold Duration", e.hold_duration)}
        </div>

        <div class="section-title">Strategy & Setup</div>
        <div class="grid grid-cols-2 gap-5">
          ${field("Point of Interest", e.point_of_interest)}
          ${field("Management Strategy", e.management)}
          ${field("Confirmations", e.confirmations)}
          ${field("Executions", e.executions)}
          ${field("Stop Loss Placement", e.sl_placement)}
          ${field("Take Profit Placement", e.tp_placement)}
        </div>

        ${(e.chart_htf || e.chart_before || e.chart_after) ? `
          <div class="section-title">Charts</div>
          <div class="grid grid-cols-3 gap-4">
            ${img("Higher Time Frame", e.chart_htf)}
            ${img("Before", e.chart_before)}
            ${img("After", e.chart_after)}
          </div>
        ` : ''}

        <div class="section-title">Reflection</div>
        <div class="grid grid-cols-3 gap-5">
          ${field("Emotions", e.emotions)}
          ${field("Mistakes", e.mistakes)}
          ${field("Improvements", e.improvements)}
        </div>
      </div>
    </div>
  `;
}

function deleteJournalEntry(id) {
  JOURNAL_STATE.entries = JOURNAL_STATE.entries.filter(e => e.id !== id);
  saveJournal();
  render();
}

// ============================================================
// Journal Form
// ============================================================
function openJournalForm(id) {
  const entry = id ? JOURNAL_STATE.entries.find(e => e.id === id) : {};
  JOURNAL_STATE.editing = { ...entry };
  if (!JOURNAL_STATE.editing.id) JOURNAL_STATE.editing.id = uid();
  if (!JOURNAL_STATE.editing.date) JOURNAL_STATE.editing.date = new Date().toISOString().slice(0,10);
  JOURNAL_STATE.detailView = null;
  renderJournalFormModal();
}

function closeJournalForm() {
  JOURNAL_STATE.editing = null;
  document.getElementById("journal-modal").style.display = "none";
  document.getElementById("journal-modal").innerHTML = "";
}

function updateField(key, val) {
  if (!JOURNAL_STATE.editing) return;
  JOURNAL_STATE.editing[key] = val;
}

async function uploadField(key, fileInput) {
  if (!fileInput.files || !fileInput.files[0]) return;
  try {
    const dataUrl = await readImageAsBase64(fileInput.files[0]);
    JOURNAL_STATE.editing[key] = dataUrl;
    renderJournalFormModal();
  } catch (e) { alert("Bild konnte nicht geladen werden: " + e.message); }
}

function removeImageField(key) {
  if (!JOURNAL_STATE.editing) return;
  delete JOURNAL_STATE.editing[key];
  renderJournalFormModal();
}

function saveJournalEntry() {
  const e = JOURNAL_STATE.editing;
  if (!e) return;
  const idx = JOURNAL_STATE.entries.findIndex(x => x.id === e.id);
  if (idx >= 0) JOURNAL_STATE.entries[idx] = e;
  else JOURNAL_STATE.entries.push(e);
  try {
    saveJournal();
  } catch (err) {
    alert("Speichern fehlgeschlagen — der lokale Speicher ist voll. Lade weniger oder kleinere Bilder hoch.");
    return;
  }
  closeJournalForm();
  render();
}

function renderJournalFormModal() {
  const e = JOURNAL_STATE.editing;
  if (!e) return;
  const modal = document.getElementById("journal-modal");
  modal.style.display = "flex";
  modal.className = "modal-bg";

  const input = (key, label, type = "text", placeholder = "") => `
    <div>
      <label class="field-label">${label}</label>
      <input type="${type}" class="field" value="${escapeHtml(e[key] || '')}" placeholder="${placeholder}"
             oninput="updateField('${key}', this.value)">
    </div>
  `;
  const select = (key, label, options) => `
    <div>
      <label class="field-label">${label}</label>
      <select class="field" onchange="updateField('${key}', this.value)">
        <option value="">— wählen —</option>
        ${options.map(o => `<option value="${o}" ${e[key]===o?'selected':''}>${o}</option>`).join("")}
      </select>
    </div>
  `;
  const textarea = (key, label, placeholder = "", rows = 3) => `
    <div>
      <label class="field-label">${label}</label>
      <textarea class="field" rows="${rows}" placeholder="${placeholder}"
                oninput="updateField('${key}', this.value)">${escapeHtml(e[key] || '')}</textarea>
    </div>
  `;
  const imgUpload = (key, label) => `
    <div>
      <label class="field-label">${label}</label>
      <div class="img-drop ${e[key] ? 'has-image' : ''}" onclick="${e[key] ? '' : `document.getElementById('file-${key}').click()`}">
        ${e[key]
          ? `<img src="${e[key]}"><button class="img-remove" onclick="event.stopPropagation(); removeImageField('${key}')">×</button>`
          : `<div><div style="color: var(--text-mid); font-size: 13px; font-weight: 500;">+ Bild hochladen</div><div style="color: var(--text-dim); font-size: 11px; margin-top: 4px;">PNG, JPG · max 1400px</div></div>`}
      </div>
      <input id="file-${key}" type="file" accept="image/*" style="display: none" onchange="uploadField('${key}', this)">
    </div>
  `;

  modal.innerHTML = `
    <div class="modal scroll-thin">
      <div class="p-7 border-b" style="border-color: var(--border)">
        <div class="flex items-center justify-between">
          <div>
            <div class="kpi-label mb-1">Journal Entry</div>
            <h2 class="font-bold" style="font-size: 22px;">${JOURNAL_STATE.entries.find(x => x.id === e.id) ? 'Eintrag bearbeiten' : 'Neuer Eintrag'}</h2>
          </div>
          <button class="btn-ghost btn btn-sm" onclick="closeJournalForm()">✕ Schließen</button>
        </div>
      </div>

      <div class="p-7">
        <div class="section-title">Trade Info</div>
        <div class="grid grid-cols-3 gap-4">
          ${input("date", "Datum", "date")}
          ${select("instrument", "Instrument / Future", INSTRUMENTS)}
          ${select("session", "Session", SESSIONS)}
          ${select("quarter", "Quarter", QUARTERS)}
          ${select("direction", "Direction", DIRECTIONS)}
          ${input("point_of_interest", "Point of Interest", "text", "z.B. OB auf 4H bei 5230")}
        </div>

        <div class="section-title">Strategy & Setup</div>
        <div class="grid grid-cols-2 gap-4">
          ${textarea("confirmations", "Confirmations", "z.B. FVG im OB, BOS auf 1H...")}
          ${textarea("executions", "Executions", "z.B. Entry am BOS-Close, 3 Partials...")}
          ${input("sl_placement", "Stop Loss Placement", "text", "unter OB-Low minus 0.5×ATR")}
          ${input("tp_placement", "Take Profit Placement", "text", "TP1 1R, TP3 PAL, TP2 mid")}
          ${textarea("management", "Management Strategy", "z.B. SL→BE bei TP1, Trail nach TP2...")}
        </div>

        <div class="section-title">Execution</div>
        <div class="grid grid-cols-5 gap-4">
          ${input("hold_duration", "Hold Duration", "text", "4h 20min")}
          ${input("rr", "Risk to Reward", "text", "1:3")}
          ${select("outcome", "Outcome", OUTCOMES)}
          ${input("pnl_dollar", "P&L ($)", "number", "312.50")}
          ${input("pnl_pct", "P&L (%)", "number", "3.12")}
        </div>

        <div class="section-title">Charts</div>
        <div class="grid grid-cols-3 gap-4">
          ${imgUpload("chart_htf", "Higher Time Frame")}
          ${imgUpload("chart_before", "Chart Before")}
          ${imgUpload("chart_after", "Chart After")}
        </div>

        <div class="section-title">Reflection</div>
        <div class="grid grid-cols-3 gap-4">
          ${textarea("emotions", "Emotions", "Wie hast du dich gefühlt?")}
          ${textarea("mistakes", "Mistakes", "Was war nicht regelkonform?")}
          ${textarea("improvements", "Improvements", "Was machst du beim nächsten Trade besser?")}
        </div>

        <div class="flex justify-end gap-3 mt-8 pt-5 border-t" style="border-color: var(--border)">
          <button class="btn btn-ghost" onclick="closeJournalForm()">Abbrechen</button>
          <button class="btn" onclick="saveJournalEntry()">Eintrag speichern</button>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// View: Bots
// ============================================================
function viewBots() {
  return `
    <div class="flex items-end justify-between mb-7">
      <div>
        <div class="kpi-label mb-2">Automation</div>
        <h1 class="page-title">Trading Bots</h1>
        <p class="page-subtitle">${STATE.bots.length} ${STATE.bots.length !== 1 ? 'Bots' : 'Bot'} · ${STATE.bots.filter(b=>b.status==='live').length} live · ${STATE.bots.filter(b=>b.status==='backtest_only').length} Backtest</p>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="if(confirm('Alle Bot-Änderungen zurücksetzen?')) resetBots()">Reset</button>
    </div>
    <div class="panel-stack">
      ${STATE.bots.map((b, idx) => renderBotCard(b, idx)).join("")}
    </div>
  `;
}

function renderBotCard(b, idx) {
  const p = b.performance;
  return `
    <div class="panel p-7">
      <div class="flex items-start justify-between mb-6">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <h2 class="font-bold" style="font-size: 22px; letter-spacing: -0.01em;">${b.name}</h2>
            <span class="badge ${b.status === 'live' ? 'badge-live' : 'badge-backtest'}">${b.status === 'live' ? 'Live' : 'Backtest'}</span>
          </div>
          <p class="text-sm" style="color: var(--text-mid)">${b.description}</p>
          <p class="text-xs mt-2 mono" style="color: var(--text-dim)">Strategy: ${b.strategy_id}</p>
        </div>
        <button class="btn btn-ghost btn-sm" onclick='exportBot(${idx})'>Export YAML</button>
      </div>
      <div class="grid grid-cols-5 gap-3 mb-6">
        <div class="panel-soft p-4"><div class="kpi-label">Trades</div><div class="text-xl font-bold num mt-2">${p.trades}</div></div>
        <div class="panel-soft p-4"><div class="kpi-label">Winrate</div><div class="text-xl font-bold num mt-2">${p.winrate}%</div></div>
        <div class="panel-soft p-4"><div class="kpi-label">Total Return</div><div class="text-xl font-bold num mt-2 ${cls(p.total_return_pct)}">${fmtPct(p.total_return_pct)}</div></div>
        <div class="panel-soft p-4"><div class="kpi-label">CAGR</div><div class="text-xl font-bold num mt-2 ${cls(p.cagr_pct)}">${fmtPct(p.cagr_pct)}</div></div>
        <div class="panel-soft p-4"><div class="kpi-label">Max DD</div><div class="text-xl font-bold num mt-2 loss">${p.max_dd_pct.toFixed(1)}%</div></div>
      </div>
      <div>
        <div class="kpi-label mb-3">Parameter <span style="color: var(--text-dim); text-transform: none; letter-spacing: 0; font-weight: 500">— im Browser gespeichert</span></div>
        <div class="grid grid-cols-3 gap-3">
          ${Object.entries(b.params).filter(([k,v]) => typeof v !== 'object').map(([k,v]) => `
            <div>
              <label class="field-label">${k}</label>
              <input class="field" type="${typeof v === 'number' ? 'number' : 'text'}" step="${typeof v === 'number' ? '0.1' : '1'}" value="${v}"
                     onchange="updateBotParam(${idx}, '${k}', this.value, '${typeof v}')">
            </div>
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

function updateBotParam(botIdx, key, value, type) {
  STATE.bots[botIdx].params[key] = type === "number" ? parseFloat(value) : value;
  saveBots();
}

function exportBot(idx) {
  const b = STATE.bots[idx];
  const yaml = Object.entries(b.params).map(([k,v]) => `  ${k}: ${JSON.stringify(v)}`).join("\n");
  const text = `# ${b.name}\nstrategy: ${b.strategy_id}\nparams:\n${yaml}\n`;
  const blob = new Blob([text], { type: "text/yaml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${b.id}.yaml`; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// Render
// ============================================================
function render() {
  const route = currentRoute();
  document.querySelectorAll(".nav-item[data-route]").forEach(el => {
    el.classList.toggle("active", el.dataset.route === route);
    if (!el.hasAttribute("data-bound")) {
      el.setAttribute("data-bound", "1");
      el.addEventListener("click", (ev) => { ev.preventDefault(); navigate(el.dataset.route); });
    }
  });

  const root = document.getElementById("view-root");
  if (route === "dashboard") { root.innerHTML = viewDashboard(); renderDashboardCharts(); }
  else if (route === "strategien") { root.innerHTML = viewStrategien(); }
  else if (route === "trades") { root.innerHTML = viewTrades(); }
  else if (route === "journal") { root.innerHTML = viewJournal(); }
  else if (route === "bots") { root.innerHTML = viewBots(); }

  root.querySelectorAll("[data-route]").forEach(el => {
    el.addEventListener("click", (ev) => { ev.preventDefault(); navigate(el.dataset.route); });
  });

  document.getElementById("footer-period").textContent =
    `${DATA.kpis.data_period_start} → ${DATA.kpis.data_period_end}`;
}

render();
</script>
</body>
</html>
