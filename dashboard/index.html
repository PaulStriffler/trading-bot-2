<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trading Bot · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
  :root {
    --bg: #000000;
    --bg-soft: #050505;
    --panel: #0a0a0a;
    --panel-2: #121212;
    --panel-3: #181818;
    --border: #1a1a1a;
    --border-soft: #141414;
    --border-strong: #2a2a2a;
    --text: #f0f0f0;
    --text-dim: #8a8a8a;
    --text-faint: #5a5a5a;
    --text-ghost: #3a3a3a;
    --accent: #ffffff;
    --accent-soft: rgba(255,255,255,0.06);
    --win: #c8d4c1;
    --loss: #d4c1c4;
    --win-soft: rgba(200,212,193,0.10);
    --loss-soft: rgba(212,193,196,0.10);
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
  body { font-weight: 400; letter-spacing: -0.005em; }

  .serif { font-family: 'Fraunces', serif; font-weight: 400; letter-spacing: -0.02em; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; }
  .panel-soft { background: var(--panel-2); border: 1px solid var(--border-soft); border-radius: 4px; }
  .panel-elevated { background: var(--panel); border: 1px solid var(--border-strong); border-radius: 4px; }

  .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-faint); font-weight: 500; }
  .kpi-value { font-size: 32px; font-weight: 300; letter-spacing: -0.02em; margin-top: 8px; line-height: 1; font-feature-settings: "tnum" 1; }
  .kpi-value.small { font-size: 22px; }

  .win { color: var(--win); }
  .loss { color: var(--loss); }
  .num { font-variant-numeric: tabular-nums; }

  /* Sidebar */
  .nav-item {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 16px; cursor: pointer;
    color: var(--text-dim); font-size: 13px; font-weight: 400;
    letter-spacing: 0.02em;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { color: var(--text); background: var(--panel-2); }
  .nav-item.active { color: var(--text); border-left-color: var(--accent); background: var(--panel-2); }
  .nav-item.active .nav-icon { color: var(--text); }
  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-faint); }

  /* Badges & pills */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 2px; font-size: 10px;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em;
    border: 1px solid var(--border-strong);
  }
  .badge-active { color: var(--text); border-color: var(--text-dim); }
  .badge-planned { color: var(--text-faint); }
  .badge-win { color: var(--win); border-color: rgba(200,212,193,0.3); background: var(--win-soft); }
  .badge-loss { color: var(--loss); border-color: rgba(212,193,196,0.3); background: var(--loss-soft); }
  .badge-neutral { color: var(--text-dim); }
  .pill {
    padding: 3px 9px; border-radius: 999px; font-size: 10px;
    font-weight: 500; background: var(--panel-3); color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .pill-outline {
    background: transparent; border: 1px solid var(--border-strong);
  }

  /* Forms */
  input.field, select.field, textarea.field {
    background: var(--panel-2); border: 1px solid var(--border-strong); border-radius: 3px;
    padding: 9px 12px; color: var(--text); font-size: 13px;
    outline: none; transition: all 0.15s;
    font-family: inherit;
  }
  input.field:focus, select.field:focus, textarea.field:focus {
    border-color: var(--text-dim); background: var(--panel-3);
  }
  input.field::placeholder, textarea.field::placeholder { color: var(--text-ghost); }
  label.field-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-faint); font-weight: 500; margin-bottom: 6px; display: block;
  }
  textarea.field { resize: vertical; min-height: 60px; line-height: 1.5; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: #000; padding: 9px 18px; border-radius: 3px;
    font-size: 12px; font-weight: 500; cursor: pointer; border: none;
    letter-spacing: 0.04em; text-transform: uppercase;
    transition: all 0.15s; font-family: inherit;
  }
  .btn:hover { background: #e5e5e5; }
  .btn-ghost {
    background: transparent; color: var(--text); border: 1px solid var(--border-strong);
  }
  .btn-ghost:hover { border-color: var(--text-dim); background: var(--panel-2); }
  .btn-danger {
    background: transparent; color: var(--loss); border: 1px solid rgba(212,193,196,0.2);
  }
  .btn-danger:hover { background: var(--loss-soft); }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  /* Table */
  table.journal-table, table.trades { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.journal-table th, table.trades th {
    text-align: left; font-weight: 500; color: var(--text-faint); padding: 12px 14px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border); position: sticky; top: 0;
    background: var(--panel); cursor: pointer; user-select: none;
  }
  table.journal-table th:hover, table.trades th:hover { color: var(--text); }
  table.journal-table td, table.trades td {
    padding: 14px; border-bottom: 1px solid var(--border-soft);
  }
  table.journal-table tbody tr, table.trades tbody tr { transition: background 0.1s; }
  table.journal-table tbody tr:hover, table.trades tbody tr:hover { background: var(--panel-2); }

  /* Scrollbars */
  .scroll-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }
  .scroll-thin::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; padding: 32px; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border-strong); border-radius: 6px;
    width: 100%; max-width: 980px; max-height: 90vh; overflow-y: auto;
  }

  /* Image upload zone */
  .img-drop {
    border: 1px dashed var(--border-strong); border-radius: 3px;
    padding: 24px; text-align: center; cursor: pointer;
    transition: all 0.15s; background: var(--panel-2);
    min-height: 160px; display: flex; align-items: center; justify-content: center;
  }
  .img-drop:hover { border-color: var(--text-dim); background: var(--panel-3); }
  .img-drop.has-image { padding: 0; background: var(--bg); position: relative; overflow: hidden; }
  .img-drop img { max-width: 100%; max-height: 240px; display: block; margin: 0 auto; }
  .img-remove {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,0.75); color: white; border: none;
    width: 24px; height: 24px; border-radius: 12px; cursor: pointer;
    font-size: 14px; line-height: 1;
  }

  /* Section dividers */
  .section-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--text-faint); font-weight: 500; margin: 24px 0 12px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .section-title:first-child { margin-top: 0; }

  /* Misc */
  .divider { height: 1px; background: var(--border); margin: 24px 0; }
  hr { border: none; border-top: 1px solid var(--border); margin: 0; }

  .data-row { transition: background 0.1s; }
  .data-row:hover { background: var(--panel-2); }
</style>
</head>
<body class="min-h-screen">

<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-60 flex-shrink-0 border-r relative" style="border-color: var(--border); background: var(--bg-soft);">
    <div class="p-6 border-b" style="border-color: var(--border);">
      <div class="serif" style="font-size: 18px; font-weight: 500; letter-spacing: -0.02em;">Trading Desk</div>
      <div class="kpi-label mt-1" style="font-size: 9px;">ICT/SMC · v3 Final</div>
    </div>
    <nav class="py-2">
      <a class="nav-item" data-route="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="nav-item" data-route="strategien">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Strategien
      </a>
      <a class="nav-item" data-route="trades">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        Backtest Trades
      </a>
      <a class="nav-item" data-route="journal">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Journal
      </a>
      <a class="nav-item" data-route="bots">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/></svg>
        Bots
      </a>
    </nav>

    <div class="absolute bottom-0 w-60 p-5 border-t" style="border-color: var(--border)">
      <div class="kpi-label" style="font-size: 9px;">Account</div>
      <div class="serif mt-1" style="font-size: 14px;">FTMO Swing $10k</div>
      <div class="kpi-label mt-3" style="font-size: 9px;">Backtest Periode</div>
      <div class="num text-xs mt-1" style="color: var(--text-dim);" id="footer-period"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-x-auto scroll-thin">
    <div id="view-root" class="p-10"></div>
  </main>
</div>

<!-- Journal entry modal -->
<div id="journal-modal" style="display:none"></div>

<script>
// ============================================================
// State & persistence
// ============================================================
const STATE = {
  bots: loadBots(),
};
const JOURNAL_STATE = {
  entries: loadJournal(),
  editing: null,
  filter: { search: "", outcome: "all", instrument: "all" },
};

function loadBots() {
  const saved = localStorage.getItem("bots_v2");
  if (saved) { try { return JSON.parse(saved); } catch {} }
  return JSON.parse(JSON.stringify(window.DATA.bots));
}
function saveBots() { localStorage.setItem("bots_v2", JSON.stringify(STATE.bots)); }
function resetBots() {
  localStorage.removeItem("bots_v2");
  STATE.bots = loadBots(); render();
}

function loadJournal() {
  try { return JSON.parse(localStorage.getItem("journal_v1") || "[]"); }
  catch { return []; }
}
function saveJournal() { localStorage.setItem("journal_v1", JSON.stringify(JOURNAL_STATE.entries)); }

const ROUTES = ["dashboard", "strategien", "trades", "journal", "bots"];
function currentRoute() {
  const h = location.hash.replace("#", "");
  return ROUTES.includes(h) ? h : "dashboard";
}
function navigate(route) { location.hash = route; }
window.addEventListener("hashchange", render);

// ============================================================
// Helpers
// ============================================================
const fmtMoney = (n, sign = false) => {
  const num = Math.abs(n).toLocaleString("en-US", { maximumFractionDigits: 0 });
  return (n < 0 ? "-" : (sign && n > 0 ? "+" : "")) + "$" + num;
};
const fmtPct = (n, sign = true) => (sign && n > 0 ? "+" : "") + n.toFixed(1) + "%";
const cls = (n) => n >= 0 ? "win" : "loss";
const arrow = (n) => n >= 0 ? "↑" : "↓";
const uid = () => "j_" + Math.random().toString(36).slice(2, 10);

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

async function readImageAsBase64(file, maxWidth = 1400) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ratio = Math.min(1, maxWidth / img.width);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.82));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ============================================================
// View: Dashboard
// ============================================================
function viewDashboard() {
  const k = DATA.kpis;
  const main = DATA.strategies[0];
  const last3 = DATA.last3;
  const journalCount = JOURNAL_STATE.entries.length;
  return `
    <div class="mb-10">
      <div class="kpi-label mb-2">Overview</div>
      <h1 class="serif" style="font-size: 36px; font-weight: 400; letter-spacing: -0.025em;">Dashboard</h1>
      <p class="text-sm mt-2" style="color: var(--text-dim)">
        ${main.name} · Entries auf ${k.timeframe_entry || '1H'} · ${k.data_period_start} → ${k.data_period_end}
      </p>
    </div>

    <!-- Primary KPIs -->
    <div class="grid grid-cols-4 gap-px panel-elevated mb-px" style="background: var(--border);">
      <div style="background: var(--panel)" class="p-6">
        <div class="kpi-label">Total Return</div>
        <div class="kpi-value num ${cls(k.total_return_pct)}">${arrow(k.total_return_pct)} ${Math.abs(k.total_return_pct).toFixed(2)}<span style="font-size: 18px; color: var(--text-dim);">%</span></div>
        <div class="text-xs mt-3 num" style="color: var(--text-dim);">$${k.starting_equity.toLocaleString()} → $${k.end_equity.toLocaleString()}</div>
      </div>
      <div style="background: var(--panel)" class="p-6">
        <div class="kpi-label">CAGR</div>
        <div class="kpi-value num ${cls(k.cagr_pct)}">${arrow(k.cagr_pct)} ${Math.abs(k.cagr_pct).toFixed(2)}<span style="font-size: 18px; color: var(--text-dim);">%</span></div>
        <div class="text-xs mt-3" style="color: var(--text-dim);">über ${k.data_years} Jahre</div>
      </div>
      <div style="background: var(--panel)" class="p-6">
        <div class="kpi-label">Winrate</div>
        <div class="kpi-value num">${k.winrate.toFixed(1)}<span style="font-size: 18px; color: var(--text-dim);">%</span></div>
        <div class="text-xs mt-3" style="color: var(--text-dim);">${k.wins} W · ${k.losses} L</div>
      </div>
      <div style="background: var(--panel)" class="p-6">
        <div class="kpi-label">Max Drawdown</div>
        <div class="kpi-value num loss">↓ ${Math.abs(k.max_dd_pct).toFixed(1)}<span style="font-size: 18px; color: var(--text-dim);">%</span></div>
        <div class="text-xs mt-3" style="color: var(--text-dim);">Peak to Trough</div>
      </div>
    </div>

    <!-- Secondary KPIs -->
    <div class="grid grid-cols-4 gap-px panel-elevated mb-10" style="background: var(--border);">
      <div style="background: var(--panel)" class="p-5">
        <div class="kpi-label">Trades</div>
        <div class="kpi-value small num">${k.trades}</div>
      </div>
      <div style="background: var(--panel)" class="p-5">
        <div class="kpi-label">Märkte</div>
        <div class="kpi-value small num">${k.n_symbols}</div>
        <div class="text-xs mt-2 flex gap-1 flex-wrap">
          ${k.symbols.map(s => `<span class="pill">${s}</span>`).join("")}
        </div>
      </div>
      <div style="background: var(--panel)" class="p-5">
        <div class="kpi-label">Journal Entries</div>
        <div class="kpi-value small num">${journalCount}</div>
        <div class="text-xs mt-2"><a class="nav-item" data-route="journal" style="display:inline; color: var(--text-dim); padding: 0; border: none; text-decoration: underline; text-underline-offset: 3px;">Journal öffnen →</a></div>
      </div>
      <div style="background: var(--panel)" class="p-5">
        <div class="kpi-label">Strategie Version</div>
        <div class="kpi-value small">${k.strategy_version || 'v3'}</div>
        <div class="text-xs mt-2" style="color: var(--text-dim);">${k.timeframe_entry || '1H'} Entries</div>
      </div>
    </div>

    <!-- Equity curve -->
    <div class="panel-elevated p-8 mb-px">
      <div class="flex items-baseline justify-between mb-6">
        <div>
          <div class="kpi-label mb-2">Equity Curve</div>
          <div class="serif" style="font-size: 22px; font-weight: 400;">Compound</div>
        </div>
        <div class="num text-right">
          <div class="kpi-label">End Equity</div>
          <div class="text-2xl mt-1 ${cls(k.total_return_pct)}">$${k.end_equity.toLocaleString()}</div>
        </div>
      </div>
      <canvas id="equity-chart" style="max-height: 320px;"></canvas>
    </div>

    <hr class="my-px" style="border-color: var(--border-strong);">

    <!-- Last 3 trades -->
    <div class="panel-elevated p-8" style="border-top: none;">
      <div class="kpi-label mb-2">Recent Activity</div>
      <div class="serif mb-6" style="font-size: 22px; font-weight: 400;">Letzte 3 Trades</div>
      <div class="space-y-2">
        ${last3.map(t => `
          <div class="flex items-center justify-between py-4 border-b" style="border-color: var(--border);">
            <div class="flex items-center gap-6">
              <div>
                <div class="text-xs mono" style="color: var(--text-faint);">${t.entry_time}</div>
                <div class="flex items-center gap-2 mt-1">
                  <span class="font-medium" style="font-size: 14px;">${t.symbol}</span>
                  <span class="badge ${t.direction === 'long' ? 'badge-win' : 'badge-loss'}">${t.direction === 'long' ? 'Long' : 'Short'}</span>
                </div>
              </div>
              <div class="flex flex-col gap-1">
                <span class="pill pill-outline" style="align-self: flex-start;">${escapeHtml(t.exit_reason)}</span>
                <span class="text-xs" style="color: var(--text-faint);">${escapeHtml(t.confluences)}</span>
              </div>
            </div>
            <div class="text-right">
              <div class="num font-medium ${cls(t.pnl)}" style="font-size: 18px;">${fmtMoney(t.pnl, true)}</div>
              <div class="text-xs num mt-1" style="color: var(--text-dim);">R ${t.rr >= 0 ? '+' : ''}${t.rr.toFixed(2)}</div>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function renderEquityChart() {
  const ctx = document.getElementById("equity-chart"); if (!ctx) return;
  const data = DATA.equity_curve;
  new Chart(ctx, {
    type: "line",
    data: {
      labels: data.map(p => p.date),
      datasets: [{
        data: data.map(p => p.equity),
        borderColor: "#f0f0f0",
        backgroundColor: "rgba(240,240,240,0.04)",
        borderWidth: 1.5,
        fill: true,
        tension: 0.15,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: "#fff",
        pointHoverBorderColor: "#fff",
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#0a0a0a", borderColor: "#2a2a2a", borderWidth: 1, padding: 10,
          displayColors: false, titleColor: "#8a8a8a", bodyColor: "#f0f0f0",
          callbacks: { label: ctx => "$" + ctx.parsed.y.toLocaleString("en-US", { maximumFractionDigits: 0 }) }
        }
      },
      scales: {
        x: { grid: { color: "rgba(255,255,255,0.03)" }, ticks: { color: "#5a5a5a", maxTicksLimit: 10, font: { size: 10 } } },
        y: { grid: { color: "rgba(255,255,255,0.03)" }, ticks: { color: "#5a5a5a", font: { size: 10 }, callback: v => "$" + v.toLocaleString("en-US") } }
      }
    }
  });
}

// ============================================================
// View: Strategien
// ============================================================
function viewStrategien() {
  return `
    <div class="mb-10">
      <div class="kpi-label mb-2">Library</div>
      <h1 class="serif" style="font-size: 36px; font-weight: 400; letter-spacing: -0.025em;">Strategien</h1>
      <p class="text-sm mt-2" style="color: var(--text-dim)">${DATA.strategies.length} Strategien · ${DATA.strategies.filter(s=>s.status==='active').length} aktiv</p>
    </div>
    <div class="space-y-px" style="background: var(--border)">

// ============================================================
// View: Backtest Trades
// ============================================================
const TRADES_STATE = { sort: "n", asc: true, filter: { symbol: "all", result: "all", search: "" } };

function filteredTrades() {
  let t = DATA.trades.slice();
  const f = TRADES_STATE.filter;
  if (f.symbol !== "all") t = t.filter(x => x.symbol === f.symbol);
  if (f.result === "win") t = t.filter(x => x.pnl > 0);
  if (f.result === "loss") t = t.filter(x => x.pnl < 0);
  if (f.search) {
    const q = f.search.toLowerCase();
    t = t.filter(x => (x.symbol+x.exit_reason+x.confluences).toLowerCase().includes(q));
  }
  const key = TRADES_STATE.sort;
  t.sort((a,b) => {
    const va = a[key], vb = b[key];
    if (typeof va === "string") return TRADES_STATE.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    return TRADES_STATE.asc ? va - vb : vb - va;
  });
  return t;
}

function viewTrades() {
  const trades = filteredTrades();
  const symbols = ["all", ...new Set(DATA.trades.map(t => t.symbol))];
  const totalPnl = trades.reduce((a,b)=>a+b.pnl, 0);
  const wins = trades.filter(t => t.pnl > 0).length;
  return `
    <div class="mb-10">
      <div class="kpi-label mb-2">Backtest Log</div>
      <h1 class="serif" style="font-size: 36px; font-weight: 400; letter-spacing: -0.025em;">Trades</h1>
      <p class="text-sm mt-2" style="color: var(--text-dim)">${trades.length} von ${DATA.trades.length} · ${wins} Wins · <span class="${cls(totalPnl)}">${fmtMoney(totalPnl, true)}</span></p>
    </div>
    <div class="flex items-center gap-3 mb-6">
      <input type="text" class="field" placeholder="Suche..." value="${TRADES_STATE.filter.search}" oninput="TRADES_STATE.filter.search = this.value; render()" style="min-width: 240px">
      <select class="field" onchange="TRADES_STATE.filter.symbol = this.value; render()">
        ${symbols.map(s => `<option value="${s}" ${s===TRADES_STATE.filter.symbol?'selected':''}>${s === 'all' ? 'Alle Symbole' : s}</option>`).join("")}
      </select>
      <select class="field" onchange="TRADES_STATE.filter.result = this.value; render()">
        <option value="all" ${TRADES_STATE.filter.result==='all'?'selected':''}>Alle Ergebnisse</option>
        <option value="win" ${TRADES_STATE.filter.result==='win'?'selected':''}>Gewinner</option>
        <option value="loss" ${TRADES_STATE.filter.result==='loss'?'selected':''}>Verlierer</option>
      </select>
    </div>
    <div class="panel-elevated overflow-hidden">
      <div style="max-height: 65vh; overflow-y: auto" class="scroll-thin">
        <table class="trades">
          <thead>
            <tr>
              <th onclick="sortBy('n')">#</th>
              <th onclick="sortBy('entry_time')">Entry</th>
              <th onclick="sortBy('symbol')">Symbol</th>
              <th onclick="sortBy('direction')">Side</th>
              <th onclick="sortBy('entry')">Preis</th>
              <th>Conf.</th>
              <th onclick="sortBy('exit_reason')">Exit</th>
              <th onclick="sortBy('rr')" class="text-right">R</th>
              <th onclick="sortBy('pnl')" class="text-right">P&L</th>
              <th>Chart</th>
            </tr>
          </thead>
          <tbody>
            ${trades.map(t => `
              <tr>
                <td class="num" style="color: var(--text-faint)">${t.n}</td>
                <td class="num mono">${t.entry_time}</td>
                <td class="font-medium">${t.symbol}</td>
                <td><span class="badge ${t.direction === 'long' ? 'badge-win' : 'badge-loss'}">${t.direction === 'long' ? 'L' : 'S'}</span></td>
                <td class="num mono">${t.entry.toFixed(1)}</td>
                <td class="text-xs" style="color: var(--text-dim)">${t.confluences}</td>
                <td><span class="pill">${t.exit_reason}</span></td>
                <td class="num text-right ${cls(t.rr)}">${t.rr >= 0 ? '+' : ''}${t.rr.toFixed(2)}</td>
                <td class="num text-right font-medium ${cls(t.pnl)}">${fmtMoney(t.pnl, true)}</td>
                <td><a href="${t.png}" target="_blank" class="text-xs" style="color: var(--text); text-decoration: underline; text-underline-offset: 3px;">PNG →</a></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}
function sortBy(key) {
  if (TRADES_STATE.sort === key) TRADES_STATE.asc = !TRADES_STATE.asc;
  else { TRADES_STATE.sort = key; TRADES_STATE.asc = true; }
  render();
}

// ============================================================
// View: Journal (NEW)
// ============================================================
const INSTRUMENTS = ["US500", "US30", "US100", "US2000", "ES", "YM", "NQ", "RTY", "GC", "CL", "Other"];
const SESSIONS = ["Asia", "London", "New York AM", "New York PM", "London Close", "Other"];
const QUARTERS = ["Q1 (Jan-Mar)", "Q2 (Apr-Jun)", "Q3 (Jul-Sep)", "Q4 (Oct-Dec)"];
const OUTCOMES = ["Win", "Loss", "Break-even"];
const DIRECTIONS = ["Long", "Short"];

function filteredJournal() {
  let entries = JOURNAL_STATE.entries.slice();
  const f = JOURNAL_STATE.filter;
  if (f.outcome !== "all") entries = entries.filter(e => e.outcome === f.outcome);
  if (f.instrument !== "all") entries = entries.filter(e => e.instrument === f.instrument);
  if (f.search) {
    const q = f.search.toLowerCase();
    entries = entries.filter(e =>
      (e.instrument + " " + e.point_of_interest + " " + e.mistakes + " " + e.improvements + " " + e.confirmations).toLowerCase().includes(q)
    );
  }
  entries.sort((a,b) => (b.date || "").localeCompare(a.date || ""));
  return entries;
}

function viewJournal() {
  const entries = filteredJournal();
  const total = JOURNAL_STATE.entries.length;
  const wins = JOURNAL_STATE.entries.filter(e => e.outcome === "Win").length;
  const totalPnl = JOURNAL_STATE.entries.reduce((s, e) => s + (parseFloat(e.pnl_dollar) || 0), 0);
  return `
    <div class="flex items-end justify-between mb-10">
      <div>
        <div class="kpi-label mb-2">Trade Journal</div>
        <h1 class="serif" style="font-size: 36px; font-weight: 400; letter-spacing: -0.025em;">Journal</h1>
        <p class="text-sm mt-2" style="color: var(--text-dim)">
          ${total} ${total === 1 ? 'Entry' : 'Entries'}${total > 0 ? ` · ${wins} W · ${total - wins} L · <span class="${cls(totalPnl)}">${fmtMoney(totalPnl, true)}</span>` : ''}
        </p>
      </div>
      <button class="btn" onclick="openJournalForm()">+ Neuer Eintrag</button>
    </div>

    ${total > 0 ? `
      <div class="flex items-center gap-3 mb-6">
        <input type="text" class="field" placeholder="Suche..." value="${escapeHtml(JOURNAL_STATE.filter.search)}" oninput="JOURNAL_STATE.filter.search = this.value; render()" style="min-width: 240px">
        <select class="field" onchange="JOURNAL_STATE.filter.instrument = this.value; render()">
          <option value="all">Alle Instrumente</option>
          ${INSTRUMENTS.map(i => `<option value="${i}" ${i===JOURNAL_STATE.filter.instrument?'selected':''}>${i}</option>`).join("")}
        </select>
        <select class="field" onchange="JOURNAL_STATE.filter.outcome = this.value; render()">
          <option value="all">Alle Ergebnisse</option>
          ${OUTCOMES.map(o => `<option value="${o}" ${o===JOURNAL_STATE.filter.outcome?'selected':''}>${o}</option>`).join("")}
        </select>
      </div>
    ` : ''}

    ${entries.length === 0 ? `
      <div class="panel-elevated p-16 text-center">
        <div class="serif mb-2" style="font-size: 22px; color: var(--text-dim);">${total === 0 ? 'Noch keine Einträge' : 'Keine Treffer'}</div>
        <p class="text-sm" style="color: var(--text-faint)">${total === 0 ? 'Starte dein Trade-Journal mit dem ersten Eintrag.' : 'Filter anpassen oder zurücksetzen.'}</p>
        ${total === 0 ? '<button class="btn mt-6" onclick="openJournalForm()">+ Ersten Eintrag erstellen</button>' : ''}
      </div>
    ` : `
      <div class="space-y-px" style="background: var(--border)">
        ${entries.map(e => renderJournalCard(e)).join("")}
      </div>
    `}
  `;
}

function renderJournalCard(e) {
  const isOpen = JOURNAL_STATE.openId === e.id;
  const pnl = parseFloat(e.pnl_dollar) || 0;
  const pnlPct = parseFloat(e.pnl_pct) || 0;
  return `
    <div style="background: var(--panel)">
      <!-- Header / Summary -->
      <div class="p-6 cursor-pointer" onclick="toggleJournalCard('${e.id}')">
        <div class="flex items-center justify-between gap-6">
          <div class="flex items-center gap-6 flex-1 min-w-0">
            <div style="min-width: 100px;">
              <div class="text-xs mono" style="color: var(--text-faint)">${e.date || '—'}</div>
              <div class="text-xs mt-1" style="color: var(--text-dim)">${escapeHtml(e.session || '')}</div>
            </div>
            <div style="min-width: 110px;">
              <div class="font-medium">${escapeHtml(e.instrument || '—')}</div>
              <span class="badge ${e.direction === 'Long' ? 'badge-win' : 'badge-loss'} mt-1">${e.direction || '—'}</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs" style="color: var(--text-faint)">Point of Interest</div>
              <div class="text-sm mt-1 truncate" title="${escapeHtml(e.point_of_interest || '')}">${escapeHtml(e.point_of_interest || '—')}</div>
            </div>
            <div>
              <span class="badge ${e.outcome === 'Win' ? 'badge-win' : e.outcome === 'Loss' ? 'badge-loss' : 'badge-neutral'}">${e.outcome || '—'}</span>
            </div>
          </div>
          <div class="text-right flex items-center gap-6">
            <div>
              <div class="num font-medium ${cls(pnl)}" style="font-size: 17px;">${fmtMoney(pnl, true)}</div>
              <div class="num text-xs mt-1" style="color: var(--text-dim)">${pnlPct >= 0 ? '+' : ''}${pnlPct.toFixed(2)}%</div>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--text-faint); transform: rotate(${isOpen ? '180deg' : '0deg'}); transition: transform 0.2s">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
      </div>
      ${isOpen ? renderJournalDetail(e) : ''}
    </div>
  `;
}

function toggleJournalCard(id) {
  JOURNAL_STATE.openId = (JOURNAL_STATE.openId === id) ? null : id;
  render();
}

function renderJournalDetail(e) {
  const field = (label, value, mono = false) => `
    <div>
      <div class="kpi-label mb-2">${label}</div>
      <div class="${mono ? 'mono num' : ''} text-sm" style="color: var(--text); line-height: 1.6;">${escapeHtml(value || '—') || '—'}</div>
    </div>
  `;
  const img = (label, src) => src ? `
    <div>
      <div class="kpi-label mb-2">${label}</div>
      <div class="panel-soft p-2"><img src="${src}" style="width: 100%; max-height: 320px; object-fit: contain; border-radius: 2px;"></div>
    </div>
  ` : '';
  return `
    <div class="px-6 pb-6 border-t" style="border-color: var(--border)">
      <!-- Trade-Info Block -->
      <div class="grid grid-cols-4 gap-6 mt-6">
        ${field("Datum", e.date)}
        ${field("Session", e.session)}
        ${field("Quarter", e.quarter)}
        ${field("Direction", e.direction)}
      </div>

      <div class="section-title">Strategy</div>
      <div class="grid grid-cols-2 gap-6">
        ${field("Point of Interest", e.point_of_interest)}
        ${field("Management Strategy", e.management)}
        ${field("Confirmations", e.confirmations)}
        ${field("Executions", e.executions)}
        ${field("Stop Loss Placement", e.sl_placement)}
        ${field("Take Profit Placement", e.tp_placement)}
      </div>

      <div class="section-title">Execution</div>
      <div class="grid grid-cols-5 gap-6">
        ${field("Hold Duration", e.hold_duration)}
        ${field("Risk to Reward", e.rr)}
        ${field("Outcome", e.outcome)}
        ${field("P&L $", e.pnl_dollar ? '$' + parseFloat(e.pnl_dollar).toFixed(2) : '', true)}
        ${field("P&L %", e.pnl_pct ? parseFloat(e.pnl_pct).toFixed(2) + '%' : '', true)}
      </div>

      ${(e.chart_htf || e.chart_before || e.chart_after) ? `
        <div class="section-title">Charts</div>
        <div class="grid grid-cols-3 gap-4">
          ${img("Higher Time Frame", e.chart_htf)}
          ${img("Before", e.chart_before)}
          ${img("After", e.chart_after)}
        </div>
      ` : ''}

      <div class="section-title">Reflection</div>
      <div class="grid grid-cols-3 gap-6">
        ${field("Emotions", e.emotions)}
        ${field("Mistakes", e.mistakes)}
        ${field("Improvements", e.improvements)}
      </div>

      <div class="flex justify-end gap-3 mt-8">
        <button class="btn btn-sm btn-ghost" onclick="openJournalForm('${e.id}')">Bearbeiten</button>
        <button class="btn btn-sm btn-danger" onclick="deleteJournalEntry('${e.id}')">Löschen</button>
      </div>
    </div>
  `;
}

function deleteJournalEntry(id) {
  if (!confirm("Diesen Journal-Eintrag wirklich löschen?")) return;
  JOURNAL_STATE.entries = JOURNAL_STATE.entries.filter(e => e.id !== id);
  if (JOURNAL_STATE.openId === id) JOURNAL_STATE.openId = null;
  saveJournal();
  render();
}

// --- Form (modal) ---
function openJournalForm(id) {
  const entry = id ? JOURNAL_STATE.entries.find(e => e.id === id) : {};
  JOURNAL_STATE.editing = { ...entry };
  if (!JOURNAL_STATE.editing.id) JOURNAL_STATE.editing.id = uid();
  if (!JOURNAL_STATE.editing.date) JOURNAL_STATE.editing.date = new Date().toISOString().slice(0,10);
  renderJournalModal();
}

function closeJournalForm() {
  JOURNAL_STATE.editing = null;
  document.getElementById("journal-modal").style.display = "none";
  document.getElementById("journal-modal").innerHTML = "";
}

function updateField(key, val) {
  if (!JOURNAL_STATE.editing) return;
  JOURNAL_STATE.editing[key] = val;
}

async function uploadField(key, fileInput) {
  if (!fileInput.files || !fileInput.files[0]) return;
  try {
    const dataUrl = await readImageAsBase64(fileInput.files[0]);
    JOURNAL_STATE.editing[key] = dataUrl;
    renderJournalModal();
  } catch (e) { alert("Bild konnte nicht geladen werden: " + e.message); }
}

function removeImageField(key) {
  if (!JOURNAL_STATE.editing) return;
  delete JOURNAL_STATE.editing[key];
  renderJournalModal();
}

function saveJournalEntry() {
  const e = JOURNAL_STATE.editing;
  if (!e) return;
  const idx = JOURNAL_STATE.entries.findIndex(x => x.id === e.id);
  if (idx >= 0) JOURNAL_STATE.entries[idx] = e;
  else JOURNAL_STATE.entries.push(e);
  try {
    saveJournal();
  } catch (err) {
    alert("Speichern fehlgeschlagen — der lokale Speicher ist voll. Lade weniger oder kleinere Bilder hoch.");
    return;
  }
  closeJournalForm();
  render();
}

function renderJournalModal() {
  const e = JOURNAL_STATE.editing;
  if (!e) return;
  const modal = document.getElementById("journal-modal");
  modal.style.display = "flex";
  modal.className = "modal-bg";

  const input = (key, label, type = "text", placeholder = "") => `
    <div>
      <label class="field-label">${label}</label>
      <input type="${type}" class="field w-full" value="${escapeHtml(e[key] || '')}" placeholder="${placeholder}"
             oninput="updateField('${key}', this.value)">
    </div>
  `;
  const select = (key, label, options) => `
    <div>
      <label class="field-label">${label}</label>
      <select class="field w-full" onchange="updateField('${key}', this.value)">
        <option value="">— wählen —</option>
        ${options.map(o => `<option value="${o}" ${e[key]===o?'selected':''}>${o}</option>`).join("")}
      </select>
    </div>
  `;
  const textarea = (key, label, placeholder = "", rows = 3) => `
    <div>
      <label class="field-label">${label}</label>
      <textarea class="field w-full" rows="${rows}" placeholder="${placeholder}"
                oninput="updateField('${key}', this.value)">${escapeHtml(e[key] || '')}</textarea>
    </div>
  `;
  const imgUpload = (key, label) => `
    <div>
      <label class="field-label">${label}</label>
      <div class="img-drop ${e[key] ? 'has-image' : ''}" onclick="${e[key] ? '' : `document.getElementById('file-${key}').click()`}">
        ${e[key]
          ? `<img src="${e[key]}"><button class="img-remove" onclick="event.stopPropagation(); removeImageField('${key}')">×</button>`
          : `<div><div style="color: var(--text-dim); font-size: 13px;">+ Bild hochladen</div><div style="color: var(--text-faint); font-size: 11px; margin-top: 4px;">PNG, JPG · wird auf max. 1400px komprimiert</div></div>`}
      </div>
      <input id="file-${key}" type="file" accept="image/*" style="display: none" onchange="uploadField('${key}', this)">
    </div>
  `;

  modal.innerHTML = `
    <div class="modal scroll-thin">
      <div class="p-8 border-b" style="border-color: var(--border)">
        <div class="flex items-center justify-between">
          <div>
            <div class="kpi-label mb-1">Journal Entry</div>
            <h2 class="serif" style="font-size: 26px; font-weight: 400;">${JOURNAL_STATE.entries.find(x => x.id === e.id) ? 'Eintrag bearbeiten' : 'Neuer Eintrag'}</h2>
          </div>
          <button class="btn-ghost btn btn-sm" onclick="closeJournalForm()">✕ Schließen</button>
        </div>
      </div>

      <div class="p-8">
        <div class="section-title">Trade Info</div>
        <div class="grid grid-cols-3 gap-4">
          ${input("date", "Datum", "date")}
          ${select("instrument", "Instrument / Future", INSTRUMENTS)}
          ${select("session", "Session", SESSIONS)}
          ${select("quarter", "Quarter", QUARTERS)}
          ${select("direction", "Direction", DIRECTIONS)}
          ${input("point_of_interest", "Point of Interest", "text", "z.B. OB auf 4H bei 5230")}
        </div>

        <div class="section-title">Strategy & Setup</div>
        <div class="grid grid-cols-2 gap-4">
          ${textarea("confirmations", "Confirmations", "z.B. FVG im OB, BOS auf 1H...")}
          ${textarea("executions", "Executions", "z.B. Entry am BOS-Close, 3 Partials...")}
          ${input("sl_placement", "Stop Loss Placement", "text", "unter OB-Low minus 0.5×ATR")}
          ${input("tp_placement", "Take Profit Placement", "text", "TP1 1R, TP3 PAL, TP2 mid")}
          ${textarea("management", "Management Strategy", "z.B. SL→BE bei TP1, Trail nach TP2...")}
        </div>

        <div class="section-title">Execution</div>
        <div class="grid grid-cols-5 gap-4">
          ${input("hold_duration", "Hold Duration", "text", "z.B. 4h 20min")}
          ${input("rr", "Risk to Reward", "text", "z.B. 1:3")}
          ${select("outcome", "Outcome", OUTCOMES)}
          ${input("pnl_dollar", "P&L ($)", "number", "z.B. 312.50")}
          ${input("pnl_pct", "P&L (%)", "number", "z.B. 3.12")}
        </div>

        <div class="section-title">Charts</div>
        <div class="grid grid-cols-3 gap-4">
          ${imgUpload("chart_htf", "Higher Time Frame")}
          ${imgUpload("chart_before", "Chart Before")}
          ${imgUpload("chart_after", "Chart After")}
        </div>

        <div class="section-title">Reflection</div>
        <div class="grid grid-cols-3 gap-4">
          ${textarea("emotions", "Emotions", "Wie hast du dich gefühlt? Wo war die Versuchung?")}
          ${textarea("mistakes", "Mistakes", "Was ist nicht regelkonform gelaufen?")}
          ${textarea("improvements", "Improvements", "Was machst du beim nächsten Trade besser?")}
        </div>

        <div class="flex justify-end gap-3 mt-10 pt-6 border-t" style="border-color: var(--border)">
          <button class="btn btn-ghost" onclick="closeJournalForm()">Abbrechen</button>
          <button class="btn" onclick="saveJournalEntry()">Eintrag speichern</button>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// View: Bots
// ============================================================
function viewBots() {
  return `
    <div class="flex items-end justify-between mb-10">
      <div>
        <div class="kpi-label mb-2">Automation</div>
        <h1 class="serif" style="font-size: 36px; font-weight: 400; letter-spacing: -0.025em;">Trading Bots</h1>
        <p class="text-sm mt-2" style="color: var(--text-dim)">${STATE.bots.length} ${STATE.bots.length !== 1 ? 'Bots' : 'Bot'} · ${STATE.bots.filter(b=>b.status==='live').length} live · ${STATE.bots.filter(b=>b.status==='backtest_only').length} Backtest</p>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="if(confirm('Alle Bot-Änderungen zurücksetzen?')) resetBots()">Reset</button>
    </div>
    <div class="space-y-px" style="background: var(--border)">
      ${STATE.bots.map((b, idx) => renderBotCard(b, idx)).join("")}
    </div>
  `;
}

function renderBotCard(b, idx) {
  const p = b.performance;
  return `
    <div class="p-8" style="background: var(--panel)">
      <div class="flex items-start justify-between mb-8">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <h2 class="serif" style="font-size: 22px; font-weight: 400;">${b.name}</h2>
            <span class="badge ${b.status === 'live' ? 'badge-active' : 'badge-neutral'}">${b.status === 'live' ? 'Live' : 'Backtest'}</span>
          </div>
          <p class="text-sm" style="color: var(--text-dim)">${b.description}</p>
          <p class="text-xs mt-2" style="color: var(--text-faint)">Strategy: ${b.strategy_id}</p>
        </div>
        <button class="btn btn-ghost btn-sm" onclick='exportBot(${idx})'>Export YAML</button>
      </div>
      <div class="grid grid-cols-5 gap-px mb-8" style="background: var(--border)">
        <div class="p-4" style="background: var(--panel)"><div class="kpi-label">Trades</div><div class="text-xl font-light num mt-2">${p.trades}</div></div>
        <div class="p-4" style="background: var(--panel)"><div class="kpi-label">Winrate</div><div class="text-xl font-light num mt-2">${p.winrate}%</div></div>
        <div class="p-4" style="background: var(--panel)"><div class="kpi-label">Total Return</div><div class="text-xl font-light num mt-2 ${cls(p.total_return_pct)}">${fmtPct(p.total_return_pct)}</div></div>
        <div class="p-4" style="background: var(--panel)"><div class="kpi-label">CAGR</div><div class="text-xl font-light num mt-2 ${cls(p.cagr_pct)}">${fmtPct(p.cagr_pct)}</div></div>
        <div class="p-4" style="background: var(--panel)"><div class="kpi-label">Max DD</div><div class="text-xl font-light num mt-2 loss">${p.max_dd_pct.toFixed(1)}%</div></div>
      </div>
      <div>
        <div class="kpi-label mb-3">Parameter <span style="color: var(--text-faint); text-transform: none; letter-spacing: 0; font-weight: 400">— im Browser gespeichert</span></div>
        <div class="grid grid-cols-3 gap-4">
          ${Object.entries(b.params).filter(([k,v]) => typeof v !== 'object').map(([k,v]) => `
            <div>
              <label class="field-label">${k}</label>
              <input class="field w-full" type="${typeof v === 'number' ? 'number' : 'text'}" step="${typeof v === 'number' ? '0.1' : '1'}" value="${v}"
                     onchange="updateBotParam(${idx}, '${k}', this.value, '${typeof v}')">
            </div>
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

function updateBotParam(botIdx, key, value, type) {
  STATE.bots[botIdx].params[key] = type === "number" ? parseFloat(value) : value;
  saveBots();
}

function exportBot(idx) {
  const b = STATE.bots[idx];
  const yaml = Object.entries(b.params).map(([k,v]) => `  ${k}: ${JSON.stringify(v)}`).join("\n");
  const text = `# ${b.name}\nstrategy: ${b.strategy_id}\nparams:\n${yaml}\n`;
  const blob = new Blob([text], { type: "text/yaml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${b.id}.yaml`; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// Render
// ============================================================
function render() {
  const route = currentRoute();
  document.querySelectorAll(".nav-item[data-route]").forEach(el => {
    el.classList.toggle("active", el.dataset.route === route);
    if (!el.hasAttribute("data-bound")) {
      el.setAttribute("data-bound", "1");
      el.addEventListener("click", (ev) => { ev.preventDefault(); navigate(el.dataset.route); });
    }
  });

  const root = document.getElementById("view-root");
  if (route === "dashboard") { root.innerHTML = viewDashboard(); renderEquityChart(); }
  else if (route === "strategien") { root.innerHTML = viewStrategien(); }
  else if (route === "trades") { root.innerHTML = viewTrades(); }
  else if (route === "journal") { root.innerHTML = viewJournal(); }
  else if (route === "bots") { root.innerHTML = viewBots(); }

  root.querySelectorAll(".nav-item[data-route]").forEach(el => {
    el.addEventListener("click", (ev) => { ev.preventDefault(); navigate(el.dataset.route); });
  });

  document.getElementById("footer-period").textContent =
    `${DATA.kpis.data_period_start}\n${DATA.kpis.data_period_end}`;
}

render();
</script>
</body>
</html>
