<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trading Desk · E8-Style Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
  :root {
    --bg: #07090e;
    --bg-soft: #0a0d14;
    --panel: #0e131c;
    --panel-2: #131822;
    --panel-3: #1a212e;
    --border: rgba(255, 255, 255, 0.05);
    --border-strong: rgba(255, 255, 255, 0.1);
    --border-accent: rgba(20, 184, 166, 0.3);
    --text: #ffffff;
    --text-mid: #b0b8c8;
    --text-dim: #6b7585;
    --text-faint: #4a5260;
    /* E8 Markets palette */
    --accent: #14b8a6;            /* primary teal */
    --accent-glow: rgba(20, 184, 166, 0.4);
    --accent-soft: rgba(20, 184, 166, 0.12);
    --accent-light: #5eead4;
    --purple: #a855f7;
    --purple-soft: rgba(168, 85, 247, 0.15);
    --brand-gradient: linear-gradient(135deg, #14b8a6 0%, #06b6d4 100%);
    --purple-gradient: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
    --teal-gradient: linear-gradient(180deg, rgba(20,184,166,0.08), rgba(20,184,166,0) 80%);
    --win: #14b8a6;
    --win-bg: rgba(20, 184, 166, 0.12);
    --loss: #f87171;
    --loss-bg: rgba(248, 113, 113, 0.12);
    --warn: #f59e0b;
    --warn-bg: rgba(245, 158, 11, 0.12);
  }
  * { box-sizing: border-box; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  body {
    font-weight: 400; font-size: 14px; letter-spacing: -0.005em;
    background:
      radial-gradient(ellipse 900px 500px at 20% 0%, rgba(20,184,166,0.06), transparent 50%),
      radial-gradient(ellipse 700px 500px at 100% 30%, rgba(168,85,247,0.04), transparent 50%),
      var(--bg);
    min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 13px; }
  .num { font-variant-numeric: tabular-nums; }

  /* Cards */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .card-glow {
    background: var(--panel);
    border: 1px solid var(--border-accent);
    border-radius: 14px;
    box-shadow: 0 0 28px rgba(20, 184, 166, 0.10), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  /* Grid + canvas safeguards — without these Chart.js can compute the wrong width */
  .grid > * { min-width: 0; }
  canvas { max-width: 100% !important; display: block; }
  .chart-box { position: relative; width: 100%; }
  .card-purple {
    background: linear-gradient(135deg, #2a1659 0%, #1a0f3a 60%, #0e131c 100%);
    border: 1px solid rgba(168,85,247,0.25);
    border-radius: 14px;
  }
  .card-teal {
    background: linear-gradient(135deg, #0d3d3a 0%, #0a2825 60%, #0e131c 100%);
    border: 1px solid rgba(20,184,166,0.3);
    border-radius: 14px;
  }
  .card-dark { background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px; }

  /* Typography */
  .kpi-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); font-weight: 500;
  }
  .kpi-num {
    font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
    margin-top: 6px; line-height: 1; font-feature-settings: "tnum" 1;
  }
  .kpi-num.hero { font-size: 42px; font-weight: 800; letter-spacing: -0.03em; }
  .kpi-num.small { font-size: 22px; font-weight: 700; }
  .kpi-unit { font-size: 14px; color: var(--text-dim); font-weight: 500; margin-left: 2px; }

  .win { color: var(--win); } .loss { color: var(--loss); }

  /* Top header */
  .topbar {
    background: rgba(10, 13, 20, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    height: 60px; display: flex; align-items: center;
    padding: 0 24px; gap: 16px;
  }
  .search-input {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 36px;
    font-size: 13px; color: var(--text);
    width: 320px; outline: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b7585' stroke-width='2'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
    background-repeat: no-repeat; background-position: 12px center;
  }
  .search-input::placeholder { color: var(--text-faint); }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--panel-2); border: 1px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; color: var(--text-mid);
    position: relative;
  }
  .icon-btn:hover { background: var(--panel-3); color: var(--text); }
  .notif-dot {
    position: absolute; top: 7px; right: 7px;
    width: 7px; height: 7px; border-radius: 4px; background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }
  .account-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 14px; border-radius: 8px;
    background: var(--panel-2); border: 1px solid var(--border);
    font-size: 12px; font-weight: 500; color: var(--text);
  }
  .account-pill .badge-mini {
    background: var(--accent-soft); color: var(--accent);
    padding: 2px 6px; border-radius: 4px; font-size: 10px;
    font-weight: 700; letter-spacing: 0.04em;
  }
  .user-chip {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 5px 12px 5px 5px;
    border-radius: 30px;
    background: var(--panel-2); border: 1px solid var(--border);
    cursor: pointer;
  }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 14px;
    background: linear-gradient(135deg, #14b8a6, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff; font-size: 12px;
  }

  /* Sidebar */
  .sidebar {
    background: rgba(7, 9, 14, 0.95);
    backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
  }
  .brand-logo-box {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--brand-gradient);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #fff; font-size: 14px;
    letter-spacing: -0.02em;
  }
  .nav-section {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-faint); font-weight: 600;
    padding: 18px 20px 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; cursor: pointer;
    color: var(--text-mid); font-size: 13px; font-weight: 500;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.025); }
  .nav-item.active {
    color: var(--accent); border-left-color: var(--accent);
    background: linear-gradient(90deg, rgba(20,184,166,0.10), transparent 80%);
  }
  .nav-item.active .nav-icon { color: var(--accent); }
  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-dim); }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 5px; font-size: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .badge-active, .badge-live, .badge-win, .badge-long { color: var(--win); background: var(--win-bg); }
  .badge-planned, .badge-backtest { color: var(--warn); background: var(--warn-bg); }
  .badge-loss, .badge-short { color: var(--loss); background: var(--loss-bg); }
  .badge-neutral { color: var(--text-mid); background: rgba(255,255,255,0.06); }
  .pill {
    padding: 3px 9px; border-radius: 5px; font-size: 11px;
    font-weight: 500; background: rgba(255,255,255,0.05); color: var(--text-mid);
  }
  .pill-outline { background: transparent; border: 1px solid var(--border-strong); }

  /* Time pill (for chart range selector) */
  .time-pill {
    padding: 5px 11px; border-radius: 6px; font-size: 11px;
    font-weight: 600; color: var(--text-mid); cursor: pointer;
    transition: all 0.15s;
  }
  .time-pill:hover { color: var(--text); }
  .time-pill.active { color: var(--accent); background: var(--accent-soft); }

  /* Forms */
  input.field, select.field, textarea.field {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-size: 13px; font-weight: 500;
    outline: none; transition: all 0.15s; font-family: inherit; width: 100%;
  }
  input.field:focus, select.field:focus, textarea.field:focus {
    border-color: var(--accent); background: rgba(20,184,166,0.04);
    box-shadow: 0 0 0 3px rgba(20,184,166,0.12);
  }
  input.field::placeholder, textarea.field::placeholder { color: var(--text-faint); }
  label.field-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); font-weight: 600; margin-bottom: 6px; display: block;
  }
  textarea.field { resize: vertical; min-height: 64px; line-height: 1.5; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent); color: #000;
    padding: 10px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer; border: none;
    transition: all 0.15s; font-family: inherit;
    box-shadow: 0 0 16px rgba(20,184,166,0.25);
  }
  .btn:hover { background: var(--accent-light); transform: translateY(-1px); }
  .btn-ghost {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border-strong); box-shadow: none;
  }
  .btn-ghost:hover { background: var(--panel-3); border-color: var(--text-dim); transform: none; }
  .btn-danger {
    background: var(--loss-bg); color: var(--loss); border: 1px solid rgba(248,113,113,0.25);
    box-shadow: none;
  }
  .btn-danger:hover { background: rgba(248,113,113,0.2); transform: none; }
  .btn-sm { padding: 7px 14px; font-size: 11px; }

  /* Tables */
  table.dt { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.dt th {
    text-align: left; font-weight: 600; color: var(--text-dim);
    padding: 12px 16px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border); background: var(--panel);
    position: sticky; top: 0; cursor: pointer; user-select: none; white-space: nowrap;
  }
  table.dt th:hover { color: var(--text); }
  table.dt td {
    padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.03);
    white-space: nowrap;
  }
  table.dt td.wrap { white-space: normal; max-width: 220px; }
  table.dt tbody tr { transition: background 0.1s; cursor: pointer; }
  table.dt tbody tr:hover { background: rgba(255,255,255,0.025); }

  /* Scrollbars */
  .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }
  .scroll-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(5, 7, 11, 0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; padding: 24px; backdrop-filter: blur(8px);
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border-strong); border-radius: 14px;
    width: 100%; max-width: 1080px; max-height: 92vh; overflow-y: auto;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  }

  /* Image upload */
  .img-drop {
    border: 1px dashed var(--border-strong); border-radius: 10px;
    padding: 24px; text-align: center; cursor: pointer;
    transition: all 0.15s; background: rgba(255,255,255,0.02);
    min-height: 160px; display: flex; align-items: center; justify-content: center;
  }
  .img-drop:hover { border-color: var(--accent); background: var(--accent-soft); }
  .img-drop.has-image { padding: 0; background: var(--bg); position: relative; overflow: hidden; }
  .img-drop img { max-width: 100%; max-height: 240px; display: block; margin: 0 auto; border-radius: 4px; }
  .img-remove {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.85); color: white; border: 1px solid var(--border-strong);
    width: 28px; height: 28px; border-radius: 14px; cursor: pointer;
    font-size: 14px;
  }

  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--accent); font-weight: 700; margin: 24px 0 12px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .section-title:first-child { margin-top: 0; }

  /* Status dots */
  @keyframes pulse-soft { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .live-dot { width: 6px; height: 6px; border-radius: 3px; background: var(--accent);
    box-shadow: 0 0 8px var(--accent); animation: pulse-soft 1.8s ease-in-out infinite; display: inline-block; }

  /* Account analysis row */
  .analysis-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 12px; border-radius: 6px;
    font-size: 12px; transition: background 0.1s;
  }
  .analysis-row:hover { background: rgba(255,255,255,0.02); }
  .analysis-row .label { color: var(--text-mid); }
  .analysis-row .value { color: var(--text); font-weight: 600; }
  .analysis-row.highlight { background: var(--accent-soft); }
  .analysis-row.highlight .label, .analysis-row.highlight .value { color: var(--accent); }

  /* Trading day rows (Account Live Analysis card) */
  .day-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; border-radius: 8px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    transition: all 0.12s;
  }
  .day-row:hover { background: rgba(255, 255, 255, 0.04); }
  .day-row.day-win { border-color: rgba(20, 184, 166, 0.22); background: rgba(20, 184, 166, 0.06); }
  .day-row.day-loss { border-color: rgba(248, 113, 113, 0.22); background: rgba(248, 113, 113, 0.06); }
  .day-icon {
    width: 22px; height: 22px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .day-icon-win { background: rgba(20, 184, 166, 0.18); color: var(--win); }
  .day-icon-loss { background: rgba(248, 113, 113, 0.18); color: var(--loss); }
  .day-icon-empty { background: rgba(255, 255, 255, 0.04); color: var(--text-faint); }

  /* Live account cards */
  .live-banner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(20,184,166,0.12), rgba(20,184,166,0.04));
    border: 1px solid rgba(20,184,166,0.25);
    margin-bottom: 16px;
  }
  .live-banner.offline {
    background: linear-gradient(135deg, rgba(245,158,11,0.10), rgba(245,158,11,0.03));
    border-color: rgba(245,158,11,0.25);
  }
  .live-account-card {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 16px; padding: 16px 20px; border-radius: 10px;
    background: var(--panel-2); border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .live-account-card:hover { border-color: var(--border-strong); }
  .live-stat { display: flex; flex-direction: column; gap: 4px; }
  .live-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 600; }
  .live-stat-value { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

  /* Chart floating callout */
  .chart-callout {
    position: absolute; top: 18px; right: 18px;
    display: flex; align-items: center; gap: 10px;
    background: rgba(20, 184, 166, 0.95);
    color: #042520;
    padding: 8px 14px; border-radius: 10px;
    box-shadow: 0 6px 20px rgba(20, 184, 166, 0.35);
    z-index: 5;
  }
  .callout-dot {
    width: 8px; height: 8px; border-radius: 4px; background: #042520;
    box-shadow: 0 0 0 3px rgba(4, 37, 32, 0.25);
  }
  .callout-amount { font-size: 14px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
  .callout-label { font-size: 10px; font-weight: 600; opacity: 0.7; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body class="min-h-screen">

<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-56 flex-shrink-0 sidebar relative">
    <div class="p-5 flex items-center gap-3 border-b" style="border-color: var(--border);">

      <div>
        <div class="font-bold" style="font-size: 13px; letter-spacing: -0.01em;">Trading Desk</div>

    </a>

    <div class="absolute bottom-0 w-56 p-4">
      <div class="card-dark p-3 flex items-center gap-3">
        <span class="live-dot"></span>

          <div class="text-xs font-semibold">FTMO Swing</div>
          <div class="text-xs" style="color: var(--text-dim);">Backtest-Modus</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-x-auto scroll-thin">
    <!-- Top bar -->
    <div class="topbar">

<div id="journal-modal" style="display:none"></div>

<script>
const STATE = { bots: loadBots(), live: null, liveErr: null };

// ============================================================
// Live MT5 data poll
// ============================================================
async function pollLive() {
  let loaded = false;
  // 1) Try fetch (works when dashboard is served via HTTP)
  try {
    const r = await fetch("live.json?t=" + Date.now(), { cache: "no-store" });
    if (r.ok) { STATE.live = await r.json(); STATE.liveErr = null; loaded = true; }
  } catch (_) { /* fall through */ }
  // 2) Fall back to live.js script reload (works on file://)
  if (!loaded) {
    await new Promise(resolve => {
      const old = document.getElementById("live-data-script"); if (old) old.remove();
      const s = document.createElement("script");
      s.id = "live-data-script"; s.src = "live.js?t=" + Date.now();
      s.onload = () => { STATE.live = window.LIVE_DATA || null; STATE.liveErr = null; resolve(); };
      s.onerror = () => { STATE.live = null; STATE.liveErr = "no live data"; resolve(); };
      document.head.appendChild(s);
    });
  }
  const banner = document.getElementById("live-banner-slot");
  if (banner) banner.innerHTML = renderLiveBanner();
}
setInterval(pollLive, 5000);
window.addEventListener("load", pollLive);

const JOURNAL_STATE = {
  entries: loadJournal(),
  editing: null, detailView: null,
  filter: { search: "", outcome: "all", instrument: "all" },
  sort: { key: "date", asc: false },
};

function loadBots() { const s = localStorage.getItem("bots_v2"); if (s) { try { return JSON.parse(s); } catch {} } return JSON.parse(JSON.stringify(window.DATA.bots)); }
function saveBots() { localStorage.setItem("bots_v2", JSON.stringify(STATE.bots)); }
function resetBots() { localStorage.removeItem("bots_v2"); STATE.bots = loadBots(); render(); }
function loadJournal() { try { return JSON.parse(localStorage.getItem("journal_v1") || "[]"); } catch { return []; } }
function saveJournal() { localStorage.setItem("journal_v1", JSON.stringify(JOURNAL_STATE.entries)); }

const ROUTES = ["dashboard","strategien","trades","journal","bots"];
function currentRoute() { const h = location.hash.replace("#",""); return ROUTES.includes(h) ? h : "dashboard"; }
function navigate(r) { location.hash = r; }
window.addEventListener("hashchange", render);

const fmtMoney = (n, sign=false) => { const num = Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0}); return (n<0?"-":(sign&&n>0?"+":""))+"$"+num; };
const fmtMoneyDec = (n) => { const sign = n<0?"-":""; return sign+"$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); };
const fmtPct = (n, sign=true) => (sign&&n>0?"+":"")+n.toFixed(2)+"%";
const cls = n => n>=0 ? "win" : "loss";
const arrow = n => n>=0 ? "↑" : "↓";
const uid = () => "j_"+Math.random().toString(36).slice(2,10);
function escapeHtml(s) { if(s==null) return ""; return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
async function readImageAsBase64(file, maxWidth=1400) {
  return new Promise((resolve,reject)=>{ const r = new FileReader(); r.onload=(e)=>{ const img=new Image(); img.onload=()=>{ const c=document.createElement("canvas"); const k=Math.min(1,maxWidth/img.width); c.width=img.width*k; c.height=img.height*k; c.getContext("2d").drawImage(img,0,0,c.width,c.height); resolve(c.toDataURL("image/jpeg",0.82)); }; img.onerror=reject; img.src=e.target.result; }; r.onerror=reject; r.readAsDataURL(file); });
}

const chartDefaults = {
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
    tooltip: { backgroundColor: "rgba(14,19,28,0.95)", borderColor: "rgba(255,255,255,0.1)", borderWidth: 1, padding: 10, displayColors: false, titleColor: "#b0b8c8", bodyColor: "#fff" }
  }
};

// ============================================================
// Live banner — connected MT5 accounts
// ============================================================
function renderLiveBanner() {
  const live = STATE.live;
  if (!live || !live.accounts || !live.accounts.length) {
    return `

        <div class="flex items-center gap-3">
          <span class="live-dot" style="background: var(--warn); box-shadow: 0 0 8px var(--warn);"></span>

      </div>
      <div class="flex items-center gap-6">
        <div class="text-right">
          <div class="kpi-label" style="font-size: 9px;">Total Balance</div>

        </div>
        <div class="text-right">
          <div class="kpi-label" style="font-size: 9px;">Total Equity</div>
          <div class="font-bold num text-base mt-1">${fmtMoneyDec(T.equity)}</div>
        </div>
        <div class="text-right">
          <div class="kpi-label" style="font-size: 9px;">Open P&L</div>
          <div class="font-bold num text-base mt-1 ${cls(T.open_pnl)}">${T.open_pnl>=0?'+':''}${fmtMoneyDec(T.open_pnl)}</div>
        </div>
      </div>
    </div>
    <div class="grid gap-3 mb-4" style="grid-template-columns: repeat(${Math.min(live.accounts.length, 2)}, 1fr);">
      ${live.accounts.map(a => a.error ? `
        <div class="live-account-card" style="border-color: rgba(248,113,113,0.3);">
          <div style="grid-column: 1 / -1;">
            <div class="flex items-center gap-2 mb-1">
              <span class="badge badge-loss">Error</span>
              <span class="font-bold">${escapeHtml(a.label || a.id)}</span>
            </div>
            <div class="text-xs mono" style="color: var(--loss);">${escapeHtml(a.error)}</div>
          </div>
        </div>
      ` : `
        <div class="live-account-card">
          <div style="grid-column: 1 / -1;" class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
              <span class="font-bold text-sm">${escapeHtml(a.label)}</span>
              <span class="badge badge-active">${escapeHtml(a.broker || 'MT5')}</span>
              <span class="text-xs mono" style="color: var(--text-dim);">#${a.login}</span>
            </div>
            <div class="text-xs" style="color: var(--text-dim);">${escapeHtml(a.server)} · 1:${a.leverage}</div>
          </div>
          <div class="live-stat">
            <div class="live-stat-label">Balance</div>
            <div class="live-stat-value">${fmtMoneyDec(a.balance)}</div>
          </div>
          <div class="live-stat">
            <div class="live-stat-label">Equity</div>
            <div class="live-stat-value">${fmtMoneyDec(a.equity)}</div>
          </div>
          <div class="live-stat">
            <div class="live-stat-label">Open P&L</div>
            <div class="live-stat-value ${cls(a.open_pnl)}">${a.open_pnl>=0?'+':''}${fmtMoneyDec(a.open_pnl)}</div>
          </div>
          <div class="live-stat">
            <div class="live-stat-label">Open Positions</div>
            <div class="live-stat-value">${a.positions_count}</div>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

// ============================================================
// Dashboard — E8 Markets style
// ============================================================
function viewDashboard() {
  const k = DATA.kpis;
  const trades = DATA.trades;
  const wins = trades.filter(t => t.pnl > 0);
  const losses = trades.filter(t => t.pnl < 0);
  const avgWin = wins.length ? wins.reduce((s,t)=>s+t.pnl,0) / wins.length : 0;
  const avgLoss = losses.length ? losses.reduce((s,t)=>s+t.pnl,0) / losses.length : 0;
  const rrAvg = Math.abs(avgWin / (avgLoss || -1));
  // Recent gain (last vs ~30 trades ago) for the floating chart callout
  const ec = DATA.equity_curve;
  const recentGain = ec.length > 30 ? (ec[ec.length-1].equity - ec[ec.length-30].equity) : (k.end_equity - k.starting_equity);

  // Trading days (Mon-Fri) of the most recent week with trades in it
  const sortedTrades = [...trades].sort((a,b) => new Date(b.entry_time) - new Date(a.entry_time));
  const recentTrade = sortedTrades[0];
  let weekStart = new Date();
  if (recentTrade) {
    const dt = new Date(recentTrade.entry_time);
    weekStart = new Date(dt); weekStart.setDate(dt.getDate() - dt.getDay() + 1); // Mon
  }
  const dayNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
  const tradingDays = dayNames.map((name, i) => {
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
    const dStr = d.toISOString().slice(0, 10);
    const dayTrades = trades.filter(t => t.entry_time.slice(0,10) === dStr);
    const dayPnl = dayTrades.reduce((s,t) => s+t.pnl, 0);
    return { name, date: dStr, count: dayTrades.length, pnl: dayPnl };
  });

  return `
    <div id="live-banner-slot">${renderLiveBanner()}</div>

    <div class="grid gap-4" style="grid-template-columns: 1.6fr 1fr;">
      <!-- ===== LEFT: BALANCE CHART CARD ===== -->
      <div class="card-glow p-5 relative overflow-hidden">
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--teal-gradient); pointer-events: none;"></div>
        <div class="relative">
          <div class="flex items-start justify-between mb-5">
            <div>
              <div class="kpi-label">Balance</div>
              <div class="flex items-baseline gap-2 mt-2">
                <div class="kpi-num hero">${fmtMoneyDec(k.end_equity)}</div>
                <span class="badge ${cls(k.total_return_pct) === 'win' ? 'badge-win' : 'badge-loss'}" style="padding: 4px 8px;">
                  ${arrow(k.total_return_pct)} ${Math.abs(k.total_return_pct).toFixed(2)}%
                </span>
              </div>
            </div>
            <div class="flex gap-1">
              <span class="time-pill">24H</span>
              <span class="time-pill">1W</span>
              <span class="time-pill">1M</span>
              <span class="time-pill">6M</span>
              <span class="time-pill">1Y</span>
              <span class="time-pill active">ALL</span>
            </div>
          </div>
          <div class="chart-box" style="height: 240px;">
            <canvas id="balance-chart"></canvas>
            <!-- Floating callout in the chart -->
            <div class="chart-callout">
              <div class="callout-dot"></div>
              <div>
                <div class="callout-amount">${arrow(recentGain)} $${Math.abs(recentGain).toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                <div class="callout-label">recent gain</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== RIGHT: ACCOUNT LIVE ANALYSIS ===== -->
      <div class="card-glow p-5 relative overflow-hidden">
        <div style="position: absolute; top: 0; right: -40px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(20,184,166,0.12), transparent 70%); pointer-events: none;"></div>
        <div class="relative">
          <div class="flex items-center justify-between mb-4">
            <div>
              <div class="kpi-label">Account Live Analysis</div>
              <div class="text-base font-bold mt-1">Trading Days</div>
            </div>
            <span class="badge badge-active">${k.data_years}y</span>
          </div>
          <div class="space-y-2">
            ${tradingDays.map(d => `
              <div class="day-row ${d.count > 0 ? (d.pnl >= 0 ? 'day-win' : 'day-loss') : ''}">
                <div class="flex items-center gap-3">
                  <div class="day-icon ${d.count > 0 ? (d.pnl >= 0 ? 'day-icon-win' : 'day-icon-loss') : 'day-icon-empty'}">
                    ${d.count > 0
                      ? `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`
                      : '·'}
                  </div>
                  <div>
                    <div class="font-semibold text-xs">${d.name}</div>
                    <div class="text-xs mono" style="color: var(--text-dim);">${d.date}</div>
                  </div>
                </div>
                <div class="text-right num font-bold text-xs ${d.count > 0 ? cls(d.pnl) : ''}" style="${d.count === 0 ? 'color: var(--text-faint);' : ''}">
                  ${d.count > 0 ? fmtMoney(d.pnl, true) : '—'}
                  <div class="text-xs mt-0.5" style="color: var(--text-dim); font-weight: 500;">${d.count} ${d.count === 1 ? 'trade' : 'trades'}</div>
                </div>
              </div>
            `).join("")}
          </div>
          <div class="mt-4 pt-3 border-t flex items-center justify-between" style="border-color: var(--border);">
            <div>
              <div class="kpi-label" style="font-size: 10px;">Total this period</div>
              <div class="text-base font-bold num mt-1 ${cls(tradingDays.reduce((s,d)=>s+d.pnl,0))}">
                ${fmtMoney(tradingDays.reduce((s,d)=>s+d.pnl,0), true)}
              </div>
            </div>
            <div class="text-right">
              <div class="kpi-label" style="font-size: 10px;">Account size</div>
              <div class="text-base font-bold num mt-1">${fmtMoney(k.starting_equity)}</div>

    <div class="grid grid-cols-4 gap-4 mt-4">
      <div class="card p-5">
        <div class="kpi-label">Average Win</div>
        <div class="kpi-num win mt-3">${fmtMoneyDec(avgWin)}</div>
        <div class="text-xs mt-3" style="color: var(--text-dim);">${wins.length} winning trades</div>
      </div>
      <div class="card p-5">
        <div class="kpi-label">Average Loss</div>
        <div class="kpi-num loss mt-3">${fmtMoneyDec(avgLoss)}</div>
        <div class="text-xs mt-3" style="color: var(--text-dim);">${losses.length} losing trades</div>
      </div>
      <div class="card p-5">
        <div class="kpi-label">Win Ratio</div>
        <div class="kpi-num mt-3">${k.winrate.toFixed(0)}<span class="kpi-unit">%</span></div>
        <div class="text-xs mt-3" style="color: var(--text-dim);">${k.wins} / ${k.trades} trades</div>
      </div>
      <div class="card p-5">
        <div class="kpi-label">Risk Reward</div>
        <div class="kpi-num mt-3">1 : ${rrAvg.toFixed(2)}</div>
        <div class="text-xs mt-3" style="color: var(--text-dim);">avg win ÷ avg loss</div>
      </div>
    </div>

    <!-- ===== STRATEGY PRESET ROW ===== -->
    <div class="grid grid-cols-3 gap-4 mt-4">
      <div class="card p-5">
        <div class="kpi-label">Setup Trading Trigger</div>
        <div class="text-base font-bold mt-2" style="color: var(--text-mid);">Weekly Bias</div>
        <div class="kpi-num small mt-3">1 Day</div>
      </div>
      <div class="card p-5">
        <div class="kpi-label">Profit Target</div>
        <div class="text-base font-bold mt-2" style="color: var(--text-mid);">TP3 / PAL</div>
        <div class="kpi-num small mt-3">US\$10,800</div>
      </div>
      <div class="card-glow p-5 relative overflow-hidden">
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--teal-gradient); pointer-events: none;"></div>
        <div class="relative">
          <div class="kpi-label" style="color: var(--accent-light);">Initial Balance Loss</div>
          <div class="text-base font-bold mt-2" style="color: var(--text);">Kill Switch</div>
          <div class="kpi-num small mt-3 win">US\$0.00</div>
        </div>
      </div>
    </div>
  `;
}

function renderDashboardCharts() {
  const eq = document.getElementById("balance-chart");
  if (eq) {
    const data = DATA.equity_curve;
    new Chart(eq, {
      type: "line",
      data: {
        labels: data.map(p => p.date),
        datasets: [{
          data: data.map(p => p.equity),
          borderColor: "#14b8a6", borderWidth: 2.5,
          backgroundColor: ctx => {
            const c = ctx.chart.ctx;
            const g = c.createLinearGradient(0, 0, 0, 280);
            g.addColorStop(0, "rgba(20,184,166,0.4)");
            g.addColorStop(1, "rgba(20,184,166,0)");
            return g;
          },
          fill: true, tension: 0.35, pointRadius: 0,
          pointHoverRadius: 5, pointHoverBackgroundColor: "#14b8a6",
        }]
      },
      options: {
        ...chartDefaults,
        plugins: { ...chartDefaults.plugins, tooltip: {
          ...chartDefaults.plugins.tooltip,
          callbacks: { label: ctx => "$" + ctx.parsed.y.toLocaleString("en-US", { maximumFractionDigits: 0 }) }
        }},
        scales: {
          x: { grid: { color: "rgba(255,255,255,0.02)" }, ticks: { color: "#6b7585", maxTicksLimit: 8, font: { size: 10 } } },
          y: { grid: { color: "rgba(255,255,255,0.03)" }, ticks: { color: "#6b7585", font: { size: 10 }, callback: v => "$" + (v/1000).toFixed(1) + "K" } }
        }
      }
    });
  }

  const list = document.getElementById("symbol-list");
  if (list) {
    const bySym = {};
    DATA.trades.forEach(t => {
      if (!bySym[t.symbol]) bySym[t.symbol] = { pnl: 0, wins: 0, total: 0 };
      bySym[t.symbol].pnl += t.pnl; bySym[t.symbol].total += 1;
      if (t.pnl > 0) bySym[t.symbol].wins += 1;
    });
    const arr = Object.entries(bySym).sort((a,b) => b[1].pnl - a[1].pnl);
    const maxAbs = Math.max(...arr.map(([,v]) => Math.abs(v.pnl))) || 1;
    list.innerHTML = arr.map(([sym, s]) => {
      const w = (Math.abs(s.pnl) / maxAbs) * 100;
      return `
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <div class="flex items-center gap-2">
              <div class="w-7 h-7 rounded-md flex items-center justify-center font-bold text-xs"
                   style="background: var(--accent-soft); color: var(--accent);">${sym.slice(2,4)}</div>
              <div>
                <div class="font-bold text-xs">${sym}</div>
                <div class="text-xs" style="color: var(--text-dim); font-size: 10px;">${s.total} trades · ${Math.round(s.wins/s.total*100)}% WR</div>
              </div>
            </div>
            <div class="num font-bold text-xs ${cls(s.pnl)}">${fmtMoney(s.pnl, true)}</div>
          </div>
          <div class="w-full h-1 rounded-full overflow-hidden" style="background: rgba(255,255,255,0.05);">
            <div class="h-full rounded-full" style="width: ${w}%; background: ${s.pnl >= 0 ? 'linear-gradient(90deg, var(--accent), var(--accent-light))' : 'linear-gradient(90deg, var(--loss), #fca5a5)'};"></div>
          </div>
        </div>`;
    }).join("");
  }
}

const TRADES_STATE = { sort: "n", asc: true, filter: { symbol: "all", result: "all", search: "" } };

}

function filteredJournal() {

  const key = JOURNAL_STATE.sort.key;
  entries.sort((a,b) => { const va=(a[key]||""), vb=(b[key]||""); if (key==="pnl_dollar"||key==="pnl_pct") return JOURNAL_STATE.sort.asc ? (parseFloat(va)||0)-(parseFloat(vb)||0) : (parseFloat(vb)||0)-(parseFloat(va)||0); return JOURNAL_STATE.sort.asc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va)); });
  return entries;
}
function sortJournal(key) { if (JOURNAL_STATE.sort.key===key) JOURNAL_STATE.sort.asc=!JOURNAL_STATE.sort.asc; else { JOURNAL_STATE.sort.key=key; JOURNAL_STATE.sort.asc=false; } render(); }

        <div class="section-title">Reflection</div>
        <div class="grid grid-cols-3 gap-4">${ta("emotions","Emotions","Wie hast du dich gefühlt?")}${ta("mistakes","Mistakes","Was war nicht regelkonform?")}${ta("improvements","Improvements","Was machst du beim nächsten Trade besser?")}</div>
        <div class="flex justify-end gap-3 mt-8 pt-5 border-t" style="border-color: var(--border)">
          <button class="btn btn-ghost" onclick="closeJournalForm()">Abbrechen</button>
          <button class="btn" onclick="saveJournalEntry()">Eintrag speichern</button>
        </div>
      </div>
    </div>`;
}

// ============================================================
// Bots
// ============================================================
function viewBots() {
  return `
    <div class="flex items-end justify-between mb-6">
      <div>
        <div class="kpi-label">Automation</div>
        <h1 class="text-2xl font-bold mt-1 tracking-tight">Trading Bots</h1>
        <p class="text-sm mt-1" style="color: var(--text-mid);">${STATE.bots.length} ${STATE.bots.length !== 1 ? 'Bots' : 'Bot'}</p>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="if(confirm('Reset?')) resetBots()">Reset</button>
    </div>
    <div class="space-y-4">${STATE.bots.map((b, idx) => renderBotCard(b, idx)).join("")}</div>`;
}
function renderBotCard(b, idx) {
  const p = b.performance;
  return `
    <div class="card p-6">
      <div class="flex items-start justify-between mb-5">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <h2 class="font-bold text-xl">${b.name}</h2>
            <span class="badge ${b.status === 'live' ? 'badge-live' : 'badge-backtest'}">${b.status === 'live' ? 'Live' : 'Backtest'}</span>
          </div>
          <p class="text-sm" style="color: var(--text-mid)">${b.description}</p>
          <p class="text-xs mt-2 mono" style="color: var(--text-dim)">Strategy: ${b.strategy_id}</p>
        </div>
        <button class="btn btn-ghost btn-sm" onclick='exportBot(${idx})'>Export YAML</button>
      </div>
      <div class="grid grid-cols-5 gap-3 mb-5">
        <div class="card-dark p-4"><div class="kpi-label">Trades</div><div class="kpi-num small num mt-2">${p.trades}</div></div>
        <div class="card-dark p-4"><div class="kpi-label">Winrate</div><div class="kpi-num small num mt-2">${p.winrate}%</div></div>
        <div class="card-dark p-4"><div class="kpi-label">Total Return</div><div class="kpi-num small num mt-2 ${cls(p.total_return_pct)}">${fmtPct(p.total_return_pct)}</div></div>
        <div class="card-dark p-4"><div class="kpi-label">CAGR</div><div class="kpi-num small num mt-2 ${cls(p.cagr_pct)}">${fmtPct(p.cagr_pct)}</div></div>
        <div class="card-dark p-4"><div class="kpi-label">Max DD</div><div class="kpi-num small num mt-2 loss">${p.max_dd_pct.toFixed(1)}%</div></div>
      </div>
      <div>
        <div class="kpi-label mb-3">Parameter</div>
        <div class="grid grid-cols-3 gap-3">
          ${Object.entries(b.params).filter(([k,v]) => typeof v !== 'object').map(([k,v]) => `
            <div><label class="field-label">${k}</label>
              <input class="field" type="${typeof v === 'number' ? 'number' : 'text'}" step="${typeof v === 'number' ? '0.1' : '1'}" value="${v}" onchange="updateBotParam(${idx}, '${k}', this.value, '${typeof v}')">
            </div>`).join("")}
        </div>
      </div>
    </div>`;
}
function updateBotParam(idx, k, v, t) { STATE.bots[idx].params[k] = t === "number" ? parseFloat(v) : v; saveBots(); }
function exportBot(idx) {
  const b = STATE.bots[idx];
  const yaml = Object.entries(b.params).map(([k,v]) => `  ${k}: ${JSON.stringify(v)}`).join("\n");
  const text = `# ${b.name}\nstrategy: ${b.strategy_id}\nparams:\n${yaml}\n`;
  const blob = new Blob([text], { type: "text/yaml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = `${b.id}.yaml`; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// Render
// ============================================================
function render() {
  const route = currentRoute();
  document.querySelectorAll(".nav-item[data-route]").forEach(el => {
    el.classList.toggle("active", el.dataset.route === route);
    if (!el.hasAttribute("data-bound")) {
      el.setAttribute("data-bound", "1");
      el.addEventListener("click", (ev) => { ev.preventDefault(); navigate(el.dataset.route); });
    }
  });
  const root = document.getElementById("view-root");
  if (route === "dashboard") { root.innerHTML = viewDashboard(); renderDashboardCharts(); }
  else if (route === "strategien") { root.innerHTML = viewStrategien(); }
  else if (route === "trades") { root.innerHTML = viewTrades(); }
  else if (route === "journal") { root.innerHTML = viewJournal(); }
  else if (route === "bots") { root.innerHTML = viewBots(); }
  root.querySelectorAll("[data-route]").forEach(el => el.addEventListener("click", (ev) => { ev.preventDefault(); navigate(el.dataset.route); }));
}
render();
</script>
</body>
</html>
